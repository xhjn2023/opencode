<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日笔记</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #f5f5f7;
  --surface: #fff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --text-muted: #aeaeb2;
  --border: #d2d2d7;
  --border-light: #e5e5ea;
  --primary: #007aff;
  --primary-hover: #0066d6;
  --primary-light: #e8f0fe;
  --primary-text: #007aff;
  --danger: #ff3b30;
  --danger-bg: #ffe8e8;
  --success: #34c759;
  --warning: #ff9500;
  --toolbar-bg: #f8f8fa;
  --input-bg: #f8f8fa;
  --shadow: rgba(0,0,0,.04);
  --shadow-lg: rgba(0,0,0,.1);
  --tab-height: 52px;
  --header-height: 48px;
  --radius: 14px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg: #000;
  --surface: #1c1c1e;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --text-muted: #636366;
  --border: #38383a;
  --border-light: #2c2c2e;
  --primary: #0a84ff;
  --primary-hover: #409cff;
  --primary-light: #1a2a3f;
  --primary-text: #0a84ff;
  --danger: #ff453a;
  --danger-bg: #3a1a1a;
  --success: #30d158;
  --warning: #ff9f0a;
  --toolbar-bg: #1c1c1e;
  --input-bg: #2c2c2e;
  --shadow: rgba(0,0,0,.2);
  --shadow-lg: rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; transition: background .3s, color .3s; }
input, textarea, button { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

/* ==================== Layout ==================== */
#appContent { display: none; height: 100vh; height: 100dvh; flex-direction: column; position: relative; }
.tab-pages { flex: 1; overflow: hidden; position: relative; }
.tab-page { display: none; height: 100%; overflow-y: auto; padding: 0 16px calc(var(--tab-height) + var(--safe-bottom) + 8px); -webkit-overflow-scrolling: touch; }
.tab-page.active { display: block; }

/* ==================== Bottom Tab Bar ==================== */
.bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--tab-height) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--surface); border-top: 1px solid var(--border-light); display: flex; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border: none; background: none; color: var(--text-muted); font-size: 10px; cursor: pointer; transition: color .2s; padding: 4px 0; }
.tab-btn i { font-size: 20px; transition: transform .2s; }
.tab-btn.active { color: var(--primary); }
.tab-btn.active i { transform: scale(1.05); }
.tab-btn:active i { transform: scale(0.9); }

/* ==================== Header ==================== */
.page-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 8px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
.page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.page-header-actions { display: flex; gap: 6px; }
.header-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--input-bg); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.header-btn:active { transform: scale(0.9); }
.header-btn.avatar { font-size: 14px; font-weight: 600; color: var(--primary); }

/* ==================== Note Timeline ==================== */
.date-group { margin-bottom: 20px; }
.date-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); padding: 8px 4px 6px; display: flex; align-items: center; gap: 6px; }
.date-label .count { font-weight: 400; color: var(--text-muted); font-size: 12px; }
.note-card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 3px var(--shadow); cursor: pointer; transition: all .2s; position: relative; overflow: hidden; border: 1px solid var(--border-light); }
.note-card:active { transform: scale(0.98); opacity: 0.9; }
.note-card.archived { opacity: 0.6; }
.note-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.note-card-title { font-size: 16px; font-weight: 600; line-height: 1.4; flex: 1; display: flex; align-items: center; gap: 6px; color: var(--text); }
.note-card-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.note-card-snippet { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-top: 6px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
.note-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.note-card-tags .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--primary-light); color: var(--primary-text); cursor: pointer; transition: opacity .2s; }
.note-card-tags .tag:active { opacity: 0.6; }
.note-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-light); }
.note-card-actions { display: flex; gap: 2px; }
.note-card-action { width: 30px; height: 30px; border-radius: 8px; border: none; background: none; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.note-card-action:active { background: var(--input-bg); color: var(--text-secondary); }
.note-card-action.pin.active { color: var(--warning); }
.note-card-action.danger:active { color: var(--danger); }
.pin-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--warning); background: rgba(255,159,10,.12); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); text-align: center; }
.empty-state i { font-size: 48px; margin-bottom: 16px; color: var(--border); }
.empty-state p { font-size: 14px; margin-top: 4px; }

/* ==================== FAB ==================== */
.fab { position: fixed; bottom: calc(var(--tab-height) + var(--safe-bottom) + 20px); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,122,255,.35); display: flex; align-items: center; justify-content: center; transition: all .25s; z-index: 50; }
.fab:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(0,122,255,.25); }

/* ==================== Search Page ==================== */
.search-box { display: flex; align-items: center; gap: 8px; background: var(--input-bg); border-radius: var(--radius-sm); padding: 0 12px; margin: 8px 0 12px; border: 2px solid transparent; transition: border .2s; }
.search-box:focus-within { border-color: var(--primary); }
.search-box i { color: var(--text-muted); font-size: 16px; }
.search-box input { flex: 1; padding: 12px 0; border: none; background: none; font-size: 16px; outline: none; color: var(--text); }
.search-box .clear-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 14px; display: none; }
.search-box .clear-btn.visible { display: block; }
.filter-chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.filter-chip { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
.filter-chip:active { transform: scale(0.96); }
.filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ==================== Tags Page ==================== */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0; }
.tag-cloud-item { padding: 8px 16px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border-light); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); box-shadow: 0 1px 2px var(--shadow); }
.tag-cloud-item:active { transform: scale(0.96); }
.tag-cloud-item i { color: var(--primary-text); font-size: 12px; }
.tag-cloud-item .count { color: var(--text-muted); font-size: 12px; }
.tag-notes-title { font-size: 16px; font-weight: 600; margin: 16px 0 8px; display: flex; align-items: center; gap: 6px; }
.tag-notes-title .clear { font-size: 13px; font-weight: 400; color: var(--primary); cursor: pointer; }

/* ==================== Profile Page ==================== */
.profile-header { display: flex; align-items: center; gap: 16px; padding: 20px 0; }
.profile-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; }
.profile-info h2 { font-size: 18px; font-weight: 600; }
.profile-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; text-align: center; box-shadow: 0 1px 2px var(--shadow); border: 1px solid var(--border-light); }
.stat-card .num { font-size: 22px; font-weight: 700; color: var(--text); }
.stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.settings-group { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 2px var(--shadow); border: 1px solid var(--border-light); margin-bottom: 16px; }
.settings-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background .15s; }
.settings-item:last-child { border-bottom: none; }
.settings-item:active { background: var(--input-bg); }
.settings-item-left { display: flex; align-items: center; gap: 12px; }
.settings-item-left i { width: 20px; color: var(--primary); font-size: 16px; }
.settings-item-left span { font-size: 15px; }
.settings-item .badge { font-size: 12px; color: var(--text-muted); }
.toggle-switch { width: 48px; height: 30px; border-radius: 15px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background .2s; padding: 0; }
.toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
.toggle-switch.on { background: var(--success); }
.toggle-switch.on::after { transform: translateX(18px); }

/* ==================== Editor Panel ==================== */
.editor-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 200; opacity: 0; transition: opacity .3s; }
.editor-overlay.show { display: block; opacity: 1; }
.editor-panel { position: fixed; bottom: 0; left: 0; right: 0; max-height: 92vh; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; z-index: 201; transform: translateY(100%); transition: transform .35s cubic-bezier(.32,.72,0,1); display: flex; flex-direction: column; box-shadow: 0 -4px 24px var(--shadow-lg); }
.editor-panel.show { transform: translateY(0); }
.editor-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 8px auto; flex-shrink: 0; }
.editor-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px 12px; flex-shrink: 0; }
.editor-header-left { display: flex; align-items: center; gap: 8px; }
.editor-back { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--input-bg); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.editor-back:active { transform: scale(0.9); }
.editor-header h2 { font-size: 17px; font-weight: 600; }
.editor-save-btn { padding: 8px 20px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.editor-save-btn:active { transform: scale(0.96); opacity: 0.8; }
.editor-save-btn:disabled { opacity: 0.4; }
.editor-body { flex: 1; overflow-y: auto; padding: 0 16px 20px; -webkit-overflow-scrolling: touch; }
.editor-field { margin-bottom: 12px; }
.editor-field label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; display: block; }
.editor-field input[type="date"],
.editor-field input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; outline: none; transition: border .2s; background: var(--input-bg); color: var(--text); }
.editor-field input:focus { border-color: var(--primary); }
#editorContainer { height: 220px; }
.editor-field .ql-toolbar { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-color: var(--border); background: var(--toolbar-bg); }
.editor-field .ql-container { border-radius: 0 0 var(--radius-sm) var(--radius-sm); border-color: var(--border); font-size: 15px; }
.editor-field .ql-editor { min-height: 200px; }
.editor-field .ql-editor { color: var(--text); }
.editor-field .ql-editor.ql-blank::before { color: var(--text-muted); }
.editor-field .ql-snow .ql-stroke { stroke: var(--text-secondary); }
.editor-field .ql-snow .ql-fill { fill: var(--text-secondary); }
.editor-field .ql-snow .ql-picker { color: var(--text-secondary); }
.editor-field .ql-snow .ql-picker-options { background: var(--surface); border-color: var(--border); }
.editor-field .ql-snow .ql-tooltip { background: var(--surface); border-color: var(--border); color: var(--text); }
.editor-field .ql-snow .ql-tooltip input[type=text] { background: var(--input-bg); border-color: var(--border); color: var(--text); }
.editor-field .ql-toolbar button:hover .ql-stroke,
.editor-field .ql-toolbar button.ql-active .ql-stroke { stroke: var(--primary); }
.editor-field .ql-toolbar button:hover .ql-fill,
.editor-field .ql-toolbar button.ql-active .ql-fill { fill: var(--primary); }
.editor-field .ql-toolbar .ql-picker-label:hover,
.editor-field .ql-toolbar .ql-picker-label.ql-active { color: var(--primary); }
.editor-field .ql-toolbar .ql-picker-item:hover { color: var(--primary); }

/* Tag input in editor */
.tag-editor { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--input-bg); min-height: 44px; align-items: center; cursor: text; }
.tag-editor .tag-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--primary-light); color: var(--primary-text); border-radius: 12px; font-size: 13px; font-weight: 500; }
.tag-editor .tag-badge .remove { cursor: pointer; font-size: 10px; opacity: 0.5; margin-left: 2px; }
.tag-editor .tag-badge .remove:hover { opacity: 1; }
.tag-editor input { flex: 1; border: none; background: none; font-size: 15px; outline: none; color: var(--text); min-width: 80px; padding: 2px 0; }
.existing-tags-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.existing-tags-bar .preset-tag { padding: 2px 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; color: var(--text-muted); background: none; transition: all .15s; }
.existing-tags-bar .preset-tag:active { background: var(--primary-light); border-color: var(--primary-light); color: var(--primary-text); }
.existing-tags-bar .preset-tag.active { background: var(--primary-light); border-color: var(--primary-light); color: var(--primary-text); }
.save-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.save-status.saving { color: var(--warning); }
.save-status.saved { color: var(--success); }
.save-status.error { color: var(--danger); }

/* ==================== Auth Page ==================== */
.auth-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.auth-page.show { display: flex; }
.auth-box { width: 100%; max-width: 360px; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo i { font-size: 48px; color: var(--primary); }
.auth-logo h1 { font-size: 24px; font-weight: 700; margin-top: 8px; }
.auth-logo p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.auth-field { margin-bottom: 14px; }
.auth-field label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
.auth-field input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; outline: none; transition: border .2s; background: var(--surface); color: var(--text); }
.auth-field input:focus { border-color: var(--primary); }
.auth-error { color: var(--danger); font-size: 13px; text-align: center; margin-bottom: 12px; display: none; padding: 10px; background: var(--danger-bg); border-radius: var(--radius-sm); }
.auth-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; }
.auth-btn:active { transform: scale(0.98); opacity: 0.8; }
.auth-btn:disabled { opacity: 0.4; }
.auth-footer { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-secondary); }
.auth-footer a { color: var(--primary); cursor: pointer; }

/* ==================== Confirm Modal ==================== */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--surface); border-radius: var(--radius); padding: 24px; max-width: 320px; width: 100%; box-shadow: 0 8px 40px var(--shadow-lg); }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.modal-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions button { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s; }
.modal-actions button:active { transform: scale(0.97); }
.modal-btn-secondary { background: var(--input-bg); color: var(--text); }
.modal-btn-danger { background: var(--danger); color: #fff; }

/* ==================== Toast ==================== */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 10px 20px; border-radius: 20px; color: #fff; font-size: 14px; z-index: 9999; opacity: 0; transition: all .35s cubic-bezier(.32,.72,0,1); pointer-events: none; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }
.toast.info { background: var(--primary); }

/* ==================== Tab filter in notes ==================== */
.notes-tabs { display: flex; gap: 4px; margin-bottom: 12px; background: var(--input-bg); border-radius: var(--radius-sm); padding: 3px; }
.notes-tab { flex: 1; padding: 8px; text-align: center; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .2s; }
.notes-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px var(--shadow); }
.notes-tab:active { opacity: 0.7; }

/* ==================== Streak indicator ==================== */
.streak-row { display: flex; gap: 4px; margin: 8px 0 12px; overflow-x: auto; padding: 4px 0; }
.streak-day { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; background: var(--border-light); color: var(--text-muted); }
.streak-day.has-note { background: var(--primary-light); color: var(--primary-text); }
.streak-day.today { border: 2px solid var(--primary); }

/* ==================== Responsive ==================== */
@media (min-width: 768px) {
  .tab-page { max-width: 480px; margin: 0 auto; padding-left: 0; padding-right: 0; }
  .editor-panel { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .editor-panel.show { transform: translateX(-50%) translateY(0); }
  .fab { right: calc(50% - 200px); }
}
</style>
</head>
<body>

<!-- ==================== Auth ==================== -->
<div id="authPage" class="auth-page show">
  <div class="auth-box">
    <div class="auth-logo">
      <i class="fas fa-book"></i>
      <h1>每日笔记</h1>
      <p>记录每一天的思考与灵感</p>
    </div>
    <div class="auth-field">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div class="auth-field">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="输入密码" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div class="auth-field" id="confirmGroup" style="display:none;">
      <label>确认密码</label>
      <input type="password" id="authConfirm" placeholder="再次输入密码" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div id="authError" class="auth-error"></div>
    <button class="auth-btn" id="authBtn" onclick="handleAuth()"><i class="fas fa-sign-in-alt"></i> 登录</button>
    <div class="auth-footer">
      <span id="authToggleText">没有账号？</span>
      <a id="authToggleLink" onclick="toggleAuthMode()">立即注册</a>
    </div>
  </div>

function escapeHtml(str) {
  let d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function stripHtml(html) {
  let d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function fmtDate(dateStr) {
  let d = new Date(dateStr + 'T00:00:00');
  let today = new Date(); today.setHours(0,0,0,0);
  let yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  let diff = Math.round((today - d) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  let m = d.getMonth() + 1;
  let day = d.getDate();
  let weekdays = ['日','一','二','三','四','五','六'];
  if (diff < 7) return '周' + weekdays[d.getDay()];
  return m + '月' + day + '日';
}

function fmtDateFull(dateStr) {
  let d = new Date(dateStr + 'T00:00:00');
  let m = d.getMonth() + 1;
  let day = d.getDate();
  return dateStr.slice(0,4) + '年' + m + '月' + day + '日';
}

function showToast(msg, type) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function getCurrentTags() {
  let tags = [];
  document.querySelectorAll('#tagList .tag-badge').forEach(el => tags.push(el.getAttribute('data-tag')));
  return tags;
}

function renderTags(tags) {
  let container = document.getElementById('tagList');
  container.innerHTML = tags.map(t =>
    '<span class="tag-badge" data-tag="' + escapeHtml(t) + '">' +
      escapeHtml(t) +
      '<span class="remove" onclick="event.stopPropagation();removeTag(\'' + escapeHtml(t).replace(/'/g, "\\'") + '\')">&times;</span>' +
    '</span>'
  ).join('');
  renderExistingTags();
}

function addTag() {
  let input = document.getElementById('tagInput');
  let tag = input.value.trim().replace(/^#+/, '');
  if (!tag) return;
  let current = getCurrentTags();
  if (current.includes(tag)) { showToast('标签"' + tag + '"已存在', 'warning'); input.value = ''; return; }
  current.push(tag);
  renderTags(current);
  input.value = '';
  input.focus();
}

function removeTag(tag) {
  renderTags(getCurrentTags().filter(t => t !== tag));
}

function togglePresetTag(tag) {
  let current = getCurrentTags();
  if (current.includes(tag)) current = current.filter(t => t !== tag);
  else current.push(tag);
  renderTags(current);
}

function renderExistingTags() {
  let allTags = new Set();
  notesCache.forEach(n => (n.tags || []).forEach(t => allTags.add(t)));
  let el = document.getElementById('existingTags');
  if (allTags.size === 0) { el.style.display = 'none'; return; }
  let currentTags = getCurrentTags();
  let html = '';
  allTags.forEach(tag => {
    let active = currentTags.includes(tag) ? 'active' : '';
    html += '<span class="preset-tag ' + active + '" onclick="togglePresetTag(\'' + escapeHtml(tag).replace(/'/g, "\\'") + '\')">' + escapeHtml(tag) + '</span>';
  });
  el.innerHTML = html;
  el.style.display = 'flex';
}

function showAuthError(msg) {
  let el = document.getElementById('authError');

}

function hideAuthError() {
  document.getElementById('authError').style.display = 'none';

function toggleAuthMode() {

  hideAuthError();
  if (authMode === 'register') {

}

async function handleAuth() {
  let email = document.getElementById('authEmail').value.trim();
  let password = document.getElementById('authPassword').value;
  if (!email) { showAuthError('请输入邮箱'); return; }
  if (!password) { showAuthError('请输入密码'); return; }
  if (password.length < 6) { showAuthError('密码至少6位'); return; }
  if (authMode === 'register') {
    let confirm = document.getElementById('authConfirm').value;
    if (password !== confirm) { showAuthError('两次密码不一致'); return; }
  }
  hideAuthError();
  let btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (authMode === 'login' ? '登录中...' : '注册中...');
  try {
    if (authMode === 'login') {
      let { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } else {
      let { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      showToast('注册成功，请查看邮箱确认', 'success');
    }
  } catch (e) {
    showAuthError(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = authMode === 'login' ? '<i class="fas fa-sign-in-alt"></i> 登录' : '<i class="fas fa-user-plus"></i> 注册';
  }
}

/* ==================== Save ==================== */
let saveLock = false;

async function saveNote() {
  if (saveLock) return;
  let date = document.getElementById('noteDate').value;
  let title = document.getElementById('noteTitle').value.trim();
  let content = quill ? quill.root.innerHTML : '';
  let plainContent = stripHtml(content).trim();
  if (!title && !plainContent) { showToast('请填写笔记内容', 'warning'); return; }
  if (!title) title = '无标题';
  let tags = getCurrentTags();
  let btn = document.getElementById('saveBtn');
  saveLock = true;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存';
  updateSaveStatus('saving');
  try {
    if (currentNoteId) {
      let { error } = await supabaseClient
        .from('daily_notes')
        .update({ title, content, date, tags, updated_at: new Date().toISOString() })
        .eq('id', currentNoteId);
      if (error) throw error;
    } else {
      let { data: { user } } = await supabaseClient.auth.getUser();
      let { data, error } = await supabaseClient
        .from('daily_notes')
        .insert({ title, content, date, tags, user_id: user.id })
        .select();
      if (error) throw error;
      currentNoteId = data[0].id;
    }
    showToast('保存成功', 'success');
    updateSaveStatus('saved');
    btn.innerHTML = '<i class="fas fa-check"></i> 保存';
    localStorage.removeItem('daily_notes_draft');
    await loadNotes();
    closeEditor();
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
    updateSaveStatus('error', e.message);
    btn.innerHTML = '<i class="fas fa-check"></i> 保存';
  } finally {
    btn.disabled = false;
    saveLock = false;
  }
}

function updateSaveStatus(type, msg) {
  let el = document.getElementById('saveStatus');
  if (type === 'saving') {
    el.className = 'save-status saving';
    el.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
  } else if (type === 'saved') {
    el.className = 'save-status saved';
    el.innerHTML = '<i class="fas fa-check-circle"></i> 已保存';
  } else if (type === 'unsaved') {
    el.className = 'save-status saving';
    el.innerHTML = '<i class="fas fa-pen"></i> 未保存';
  } else if (type === 'error') {
    el.className = 'save-status error';
    el.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (msg || '保存失败');
  }
}

/* ==================== Export ==================== */
function exportNote(note) {
  let title = note.title || '无标题';
  let date = note.date;
  let content = stripHtml(note.content || '');
  let tags = (note.tags || []).map(t => '#' + t).join(' ');
  let md = '# ' + title + '\n\n日期：' + date + '\n标签：' + (tags || '无') + '\n\n---\n\n' + content;
  let blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = title + '_' + date + '.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出', 'success');
}

function exportAllNotes() {
  if (!notesCache.length) { showToast('没有笔记可导出', 'warning'); return; }
  let md = '# 笔记导出\n\n导出时间：' + new Date().toLocaleString() + '\n共 ' + notesCache.length + ' 篇笔记\n\n---\n\n';
  notesCache.forEach((note, i) => {
    let title = note.title || '无标题';
    let date = note.date;
    let content = stripHtml(note.content || '');
    let tags = (note.tags || []).map(t => '#' + t).join(' ');
    md += '## ' + title + '\n\n日期：' + date + '\n标签：' + (tags || '无') + '\n\n' + content + '\n\n---\n\n';
  });
  let blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'notes_export_' + new Date().toISOString().slice(0, 10) + '.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出全部笔记 (' + notesCache.length + ' 篇)', 'success');
}

/* ==================== Render Timeline ==================== */
function renderNotes(records) {
  let container = document.getElementById('notesTimeline');
  if (!records || records.length === 0) {
    let msg = currentTab === 'pinned' ? '还没有置顶的笔记' : currentTab === 'archived' ? '没有归档的笔记' : '暂无笔记，点击右下角 + 开始记录';
    container.innerHTML = '<div class="empty-state"><i class="far fa-sticky-note"></i><p>' + msg + '</p></div>';
    return;
  }
  // Group by date
  let groups = {};
  records.forEach(n => {
    if (!groups[n.date]) groups[n.date] = [];
    groups[n.date].push(n);
  });
  let sortedDates = Object.keys(groups).sort().reverse();
  let html = '';
  sortedDates.forEach(date => {
    let notes = groups[date];
    let hasPinned = notes.some(n => n.pinned);
    html += '<div class="date-group">';
    html += '<div class="date-label"><i class="far fa-calendar-alt"></i> ' + fmtDateFull(date) +
      ' <span class="count">' + notes.length + ' 篇</span>' +
      (hasPinned ? ' <span style="color:var(--warning);font-size:11px;"><i class="fas fa-thumbtack"></i></span>' : '') +
      '</div>';
    notes.forEach(note => {
      let plainText = stripHtml(note.content);
      let snippet = plainText.substring(0, 200);
      if (plainText.length > 200) snippet += '...';
      let tagsHtml = (note.tags || []).map(t =>
        '<span class="tag" onclick="event.stopPropagation();switchPage(\'tags\');selectTag(\'' + escapeHtml(t).replace(/'/g, "\\'") + '\')">' + escapeHtml(t) + '</span>'
      ).join('');
      let readingTime = Math.max(1, Math.ceil(plainText.length / 500));
      let cardClass = 'note-card' + (note.archived ? ' archived' : '');
      html += '<div class="' + cardClass + '" onclick="openEditor(\'' + note.id + '\')">' +
        '<div class="note-card-header">' +
          '<div class="note-card-title">' +
            (note.pinned ? '<span style="color:var(--warning);font-size:12px;"><i class="fas fa-thumbtack"></i></span> ' : '') +
            escapeHtml(note.title || '无标题') +
          '</div>' +
          '<span class="note-card-time">' + readingTime + '分钟</span>' +
        '</div>' +
        (snippet ? '<div class="note-card-snippet">' + escapeHtml(snippet) + '</div>' : '') +
        (tagsHtml ? '<div class="note-card-tags">' + tagsHtml + '</div>' : '') +
        '<div class="note-card-footer">' +
          '<div class="note-card-actions">' +
            '<button class="note-card-action pin' + (note.pinned ? ' active' : '') + '" onclick="togglePin(\'' + note.id + '\', event)" title="置顶"><i class="fas fa-thumbtack"></i></button>' +
            (note.archived
              ? '<button class="note-card-action" onclick="restoreNote(\'' + note.id + '\', event)" title="恢复"><i class="fas fa-undo-alt"></i></button>' +
                '<button class="note-card-action danger" onclick="deleteNotePermanently(\'' + note.id + '\', event)" title="删除"><i class="fas fa-trash-alt"></i></button>'
              : '<button class="note-card-action" onclick="exportNote(notesCache.find(n=>n.id===\'' + note.id + '\'))" title="导出"><i class="fas fa-download"></i></button>' +
                '<button class="note-card-action" onclick="archiveNote(\'' + note.id + '\', event)" title="归档"><i class="fas fa-archive"></i></button>'
            ) +
          '</div>' +
          '<span style="font-size:11px;color:var(--text-muted);">' + date.slice(5) + '</span>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
  updateProfileStats();
}

/* ==================== Tabs ==================== */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#notesTabBar .notes-tab').forEach(el => el.classList.remove('active'));
  document.querySelector('#notesTabBar .notes-tab[data-tab="' + tab + '"]').classList.add('active');
  applyFilters();
}

/* ==================== Search ==================== */
let searchTimer = null;

function onSearchInput() {
  let kw = document.getElementById('searchInput').value.trim();
  let clearBtn = document.getElementById('searchClearBtn');
  if (kw) clearBtn.classList.add('visible'); else clearBtn.classList.remove('visible');
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchKeyword = kw;
    performSearch();
  }, 200);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClearBtn').classList.remove('visible');
  searchKeyword = '';
  document.getElementById('searchResults').innerHTML = '';
}

function performSearch() {
  let container = document.getElementById('searchResults');
  if (!searchKeyword) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>输入关键词搜索笔记</p></div>'; return; }
  let kw = searchKeyword.toLowerCase();
  let isTagSearch = kw.startsWith('#');
  let results = notesCache.filter(n => {
    if (isTagSearch) {
      let tagKw = kw.slice(1);
      return (n.tags || []).some(t => t.toLowerCase().includes(tagKw));
    }
    let title = (n.title || '').toLowerCase();
    let content = stripHtml(n.content || '').toLowerCase();
    return title.includes(kw) || content.includes(kw);
  });
  results.sort((a, b) => b.date.localeCompare(a.date));
  if (results.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="far fa-frown"></i><p>没有找到匹配的笔记</p></div>';
    return;
  }
  let html = '<div style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">找到 ' + results.length + ' 条结果</div>';
  results.forEach(note => {
    let plainText = stripHtml(note.content);
    let snippet = plainText.substring(0, 150);
    if (plainText.length > 150) snippet += '...';
    let tagsHtml = (note.tags || []).map(t => '<span class="tag" style="font-size:10px;">' + escapeHtml(t) + '</span>').join('');
    html += '<div class="note-card" onclick="switchPage(\'notes\');openEditor(\'' + note.id + '\')">' +
      '<div class="note-card-header">' +
        '<div class="note-card-title" style="font-size:15px;">' +
          (note.pinned ? '<span style="color:var(--warning);font-size:10px;"><i class="fas fa-thumbtack"></i></span> ' : '') +
          escapeHtml(note.title || '无标题') +
        '</div>' +
        '<span class="note-card-time">' + note.date.slice(5) + '</span>' +
      '</div>' +
      (snippet ? '<div class="note-card-snippet" style="font-size:13px;">' + escapeHtml(snippet) + '</div>' : '') +
      (tagsHtml ? '<div class="note-card-tags">' + tagsHtml + '</div>' : '') +
    '</div>';
  });
  container.innerHTML = html;
}

/* ==================== Apply Filters ==================== */
function applyFilters() {
  let filtered = [...notesCache];
  if (currentTab === 'active') filtered = filtered.filter(n => !n.archived);
  else if (currentTab === 'pinned') filtered = filtered.filter(n => n.pinned && !n.archived);
  else if (currentTab === 'archived') filtered = filtered.filter(n => n.archived);
  filtered.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return b.date.localeCompare(a.date) || new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });
  renderNotes(filtered);
}

/* ==================== Tag Cloud ==================== */
function renderTagCloud() {
  let tagMap = {};
  notesCache.filter(n => !n.archived).forEach(n => {
    (n.tags || []).forEach(t => { if (!tagMap[t]) tagMap[t] = { count: 0, notes: [] }; tagMap[t].count++; tagMap[t].notes.push(n); });
  });
  let container = document.getElementById('tagCloud');
  let keys = Object.keys(tagMap).sort();
  if (keys.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:30px 0;"><i class="fas fa-tags"></i><p>还没有标签</p></div>';
    return;
  }
  container.innerHTML = keys.map(t =>
    '<div class="tag-cloud-item" onclick="selectTag(\'' + escapeHtml(t).replace(/'/g, "\\'") + '\')">' +
      '<i class="fas fa-hashtag"></i> ' + escapeHtml(t) +
      ' <span class="count">' + tagMap[t].count + '</span>' +
    '</div>'
  ).join('');
}

function selectTag(tag) {
  selectedTag = tag;
  document.getElementById('selectedTagName').textContent = '#' + tag;
  document.getElementById('tagNotesSection').style.display = 'block';
  let filtered = notesCache.filter(n => !n.archived && (n.tags || []).includes(tag));
  filtered.sort((a, b) => b.date.localeCompare(a.date));
  let container = document.getElementById('tagFilteredNotes');
  if (!filtered.length) { container.innerHTML = '<div class="empty-state"><p>此标签暂无笔记</p></div>'; return; }
  let html = '';
  filtered.forEach(note => {
    let snippet = stripHtml(note.content).substring(0, 150);
    html += '<div class="note-card" onclick="switchPage(\'notes\');openEditor(\'' + note.id + '\')">' +
      '<div class="note-card-header">' +
        '<div class="note-card-title" style="font-size:15px;">' + escapeHtml(note.title || '无标题') + '</div>' +
        '<span class="note-card-time">' + note.date.slice(5) + '</span>' +
      '</div>' +
      (snippet ? '<div class="note-card-snippet" style="font-size:13px;">' + escapeHtml(snippet) + '</div>' : '') +
    '</div>';
  });
  container.innerHTML = html;
}

function clearSelectedTag() {
  selectedTag = null;
  document.getElementById('tagNotesSection').style.display = 'none';
}

/* ==================== Profile Stats ==================== */
function updateProfileStats() {
  let allNotes = notesCache.filter(n => !n.archived);
  document.getElementById('statNotes').textContent = allNotes.length;
  let totalWords = 0;
  allNotes.forEach(n => totalWords += stripHtml(n.content || '').length);
  document.getElementById('statWords').textContent = totalWords;
  let days = [...new Set(allNotes.map(n => n.date))].sort().reverse();
  let streak = 0;
  if (days.length > 0) {
    let today = new Date().toISOString().slice(0, 10);
    let checkDate = new Date(today + 'T00:00:00');
    for (let i = 0; i < days.length; i++) {
      let d = new Date(days[i] + 'T00:00:00');
      let diff = Math.round((checkDate - d) / 86400000);
      if (diff === streak) streak++; else break;
    }
  }
  document.getElementById('statStreak').textContent = streak;
}

/* ==================== Modal ==================== */
function showModal(title, text, confirmText, callback) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalConfirmBtn').textContent = confirmText || '确定';
  document.getElementById('confirmModal').classList.add('show');
  confirmCallback = callback;
}
function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
}

/* ==================== Backup ==================== */
function backupToLocal(data) {
  try { localStorage.setItem('daily_notes_backup', JSON.stringify(data)); } catch (e) {}
}
function loadFromLocal() {
  try { let d = localStorage.getItem('daily_notes_backup'); return d ? JSON.parse(d) : null; } catch (e) { return null; }
}

/* ==================== Load ==================== */
async function loadNotes() {
  try {
    let { data, error } = await supabaseClient.from('daily_notes').select('*').order('date', { ascending: false });
    if (error) throw error;
    notesCache = data || [];
    backupToLocal(notesCache);
  } catch (e) {
    let local = loadFromLocal();
    if (local) { notesCache = local; showToast('网络不可用，显示本地缓存', 'warning'); }
    else { notesCache = []; showToast('无法加载数据', 'error'); }
  }
  applyFilters();
  if (document.getElementById('pageTags').classList.contains('active')) renderTagCloud();
}

/* ==================== Image Paste ==================== */
function handleImagePaste(e) {
  let items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (let item of items) {
    if (item.type.indexOf('image') === 0) {
      e.preventDefault();
      let blob = item.getAsFile();
      let reader = new FileReader();
      reader.onload = function(ev) {
        let img = '<img src="' + ev.target.result + '" alt="粘贴图片" style="max-width:100%;" />';
        let range = quill.getSelection();
        if (range) quill.clipboard.dangerouslyPasteHTML(range.index, img);
        else quill.clipboard.dangerouslyPasteHTML(quill.getLength(), img);
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

/* ==================== Keyboard ==================== */
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveNote(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveNote(); }
  if (e.key === 'Escape') {
    if (document.getElementById('editorPanel').classList.contains('show')) closeEditor();
  }
});

/* ==================== Tag Input ==================== */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('tagInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addTag(); }
  });
});

/* ==================== Init ==================== */
document.addEventListener('DOMContentLoaded', async function() {
  if (isDarkMode) applyDarkMode();

  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    quill = new Quill('#editorContainer', {
      theme: 'snow',
      placeholder: '开始记录今天的内容...',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }],
          ['blockquote', 'code-block'],
          [{ 'script': 'sub'}, { 'script': 'super' }],
          [{ 'indent': '-1'}, { 'indent': '+1' }],
          [{ 'color': [] }, { 'background': [] }],
          ['link', 'image'],
          ['clean']
        ]
      }
    });
    document.getElementById('noteDate').value = new Date().toISOString().slice(0, 10);
    showApp(session.user.email);
    loadNotes();
    quill.on('text-change', function() {
      let content = quill.root.innerHTML;
      if (content && content !== '<p><br></p>' && document.getElementById('editorPanel').classList.contains('show')) {
        updateSaveStatus('unsaved');
      }
    });
    document.getElementById('editorContainer').addEventListener('paste', handleImagePaste);
    // Restore draft
    try {
      let draft = JSON.parse(localStorage.getItem('daily_notes_draft'));
      if (draft && draft.content && draft.content !== '<p><br></p>') {
        showToast('有未保存的草稿', 'info');
      }
    } catch(e) {}
  } else {
    showLogin();
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      if (!quill) {
        quill = new Quill('#editorContainer', {
          theme: 'snow',
          placeholder: '开始记录今天的内容...',
          modules: {
            toolbar: [
              [{ 'header': [1, 2, 3, false] }],
              ['bold', 'italic', 'underline', 'strike'],
              [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }],
              ['blockquote', 'code-block'],
              [{ 'script': 'sub'}, { 'script': 'super' }],
              [{ 'indent': '-1'}, { 'indent': '+1' }],
              [{ 'color': [] }, { 'background': [] }],
              ['link', 'image'],
              ['clean']
            ]
          }
        });
        document.getElementById('noteDate').value = new Date().toISOString().slice(0, 10);
        quill.on('text-change', function() {
          let content = quill.root.innerHTML;
          if (content && content !== '<p><br></p>' && document.getElementById('editorPanel').classList.contains('show')) {
            updateSaveStatus('unsaved');
          }
        });
        document.getElementById('editorContainer').addEventListener('paste', handleImagePaste);
      }
      showApp(session.user.email);
      loadNotes();
    } else if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
});
</script>
