<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日笔记</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.app-header { text-align: center; margin-bottom: 24px; }
.app-header h1 { color: #1a365d; font-size: 26px; }
.app-header p { color: #888; font-size: 13px; margin-top: 4px; }
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.card-title { font-size: 16px; color: #1a365d; margin-bottom: 16px; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.form-group input[type="date"],
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; outline: none; transition: border .2s; background: #fff; }
.form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
#editor-container { height: 280px; }
.ql-toolbar { border-radius: 8px 8px 0 0; border-color: #d1d5db; background: #f8fafc; }
.ql-container { border-radius: 0 0 8px 8px; border-color: #d1d5db; font-size: 15px; }
.ql-editor { min-height: 260px; }
.ql-toolbar button:hover .ql-stroke,
.ql-toolbar button.ql-active .ql-stroke { stroke: #3b82f6; }
.ql-toolbar button:hover .ql-fill,
.ql-toolbar button.ql-active .ql-fill { fill: #3b82f6; }
.ql-toolbar .ql-picker-label:hover,
.ql-toolbar .ql-picker-label.ql-active { color: #3b82f6; }
.ql-toolbar .ql-picker-item:hover { color: #3b82f6; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: all .2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-secondary { background: #e5e7eb; color: #555; }
.btn-secondary:hover { background: #d1d5db; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.form-actions { display: flex; gap: 10px; margin-top: 16px; }
.form-actions .btn-primary { flex: 1; justify-content: center; }
.tag-input-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
#tagInput { flex: 1; min-width: 120px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; }
#tagInput:focus { border-color: #3b82f6; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: #dbeafe; color: #1e40af; border-radius: 6px; font-size: 13px; font-weight: 500; }
.tag-badge .remove-tag { cursor: pointer; font-size: 11px; opacity: .6; transition: opacity .2s; }
.tag-badge .remove-tag:hover { opacity: 1; }
.existing-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
.existing-tags-label { font-size: 12px; color: #999; }
.preset-tag { padding: 3px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; cursor: pointer; color: #666; transition: all .2s; background: #fafafa; }
.preset-tag:hover { border-color: #3b82f6; color: #3b82f6; }
.preset-tag.active { background: #dbeafe; border-color: #dbeafe; color: #1e40af; }
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input { width: 100%; padding: 10px 12px 10px 38px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; background: #fafafa; }
.search-wrap input:focus { border-color: #3b82f6; background: #fff; }
.search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
.note-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .15s; border-radius: 4px; }
.note-item:hover { background: #f8fafc; margin: 0 -8px; padding: 12px 8px; }
.note-item:last-child { border-bottom: none; }
.note-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.note-item-title { font-weight: 600; color: #1a365d; font-size: 15px; line-height: 1.4; flex: 1; }
.note-item-title:hover { color: #3b82f6; }
.note-item-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.note-item-date { font-size: 12px; color: #aaa; white-space: nowrap; }
.note-item-actions { display: none; }
.note-item:hover .note-item-actions { display: flex; gap: 2px; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; color: #999; transition: all .15s; font-size: 13px; }
.btn-icon:hover { background: #f0f0f0; color: #555; }
.btn-icon-danger:hover { background: #fee2e2; color: #ef4444; }
.note-item-snippet { font-size: 13px; color: #999; line-height: 1.5; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.note-item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.note-item-tags .tag-badge { font-size: 11px; padding: 2px 8px; }
.date-separator { padding: 12px 0 6px; font-size: 13px; color: #999; font-weight: 600; border-bottom: 1px solid #e5e7eb; margin-top: 4px; }
.date-separator:first-child { padding-top: 0; }
.empty { text-align: center; color: #bbb; padding: 48px 0; font-size: 14px; }
.empty i { font-size: 36px; margin-bottom: 12px; color: #ddd; display: block; }
.empty p { margin-top: 4px; color: #ccc; font-size: 13px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 9999; opacity: 0; transition: all .3s ease; pointer-events: none; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #10b981; }
.toast.error { background: #ef4444; }
.toast.warning { background: #f59e0b; }
.login-page { display: none; justify-content: center; padding-top: 80px; }
.login-card { max-width: 400px; width: 100%; }
.login-card .card-title { text-align: center; font-size: 18px; }
.login-desc { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
.form-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
.form-footer a { color: #3b82f6; cursor: pointer; text-decoration: none; }
.form-footer a:hover { text-decoration: underline; }
.auth-error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; padding: 8px; background: #fef2f2; border-radius: 6px; }
.user-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; padding: 6px 0 12px; font-size: 13px; color: #888; border-bottom: 1px solid #e5e7eb; margin-bottom: 16px; }
.user-email { font-weight: 500; color: #555; }
@media (max-width: 767px) {
  .main-grid { grid-template-columns: 1fr; }
  .container { padding: 12px; }
  .app-header h1 { font-size: 22px; }
  #editor-container { height: 200px; }
  .ql-editor { min-height: 180px; }
  .form-row { flex-direction: column; gap: 0; }
  .card { padding: 16px; }
  .note-item:hover { margin: 0 -4px; padding: 12px 4px; }
  .login-page { padding-top: 40px; }
}
</style>
</head>
<body>

<div class="container">

<div id="loginPage" class="login-page">
  <div class="card login-card">
    <div class="card-title"><i class="fas fa-book" style="color:#3b82f6;"></i> 每日笔记</div>
    <div class="login-desc">登录后记录每一天的思考与灵感</div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="请输入邮箱" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div class="form-group" id="confirmGroup" style="display:none;">
      <label>确认密码</label>
      <input type="password" id="authConfirm" placeholder="请再次输入密码" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div id="authError" class="auth-error"></div>
    <button class="btn btn-primary" id="authBtn" onclick="handleAuth()" style="width:100%;justify-content:center;">
      <i class="fas fa-sign-in-alt"></i> 登录
    </button>
    <div class="form-footer">
      <span id="authToggleText">没有账号？</span>
      <a id="authToggleLink" onclick="toggleAuthMode()">立即注册</a>
    </div>
  </div>
</div>

<div id="appContent" style="display:none;">
  <div class="user-bar">
    <span><i class="far fa-user-circle"></i> <span class="user-email" id="userEmail"></span></span>
    <button class="btn btn-secondary btn-sm" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> 退出</button>
  </div>

  <div class="app-header">
    <h1><i class="fas fa-book" style="color:#3b82f6;"></i> 每日笔记</h1>
    <p>记录每一天的思考与灵感</p>
  </div>

  <div class="main-grid">
    <div class="editor-panel">
      <div class="card">
        <div class="card-title"><i class="fas fa-edit"></i> 编辑笔记</div>
        <div class="form-row">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="noteDate">
          </div>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="noteTitle" placeholder="输入笔记标题...">
        </div>
        <div class="form-group">
          <label>内容</label>
          <div id="editorContainer"></div>
        </div>
        <div class="form-group">
          <label>标签</label>
          <div class="tag-input-wrap">
            <input type="text" id="tagInput" placeholder="输入标签后按 Enter">
          </div>
          <div id="tagList" class="tag-list"></div>
          <div id="existingTags" class="existing-tags" style="display:none;"></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="saveBtn" onclick="saveNote()"><i class="fas fa-save"></i> 保存</button>
          <button class="btn btn-secondary" id="cancelBtn" onclick="clearForm()" style="display:none;"><i class="fas fa-times"></i> 取消</button>
        </div>
      </div>
    </div>

    <div class="list-panel">
      <div class="card">
        <div class="card-title"><i class="fas fa-list"></i> 笔记列表</div>
        <div class="search-wrap">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="搜索笔记标题或内容..." oninput="filterNotes()">
        </div>
        <div id="notesList"></div>
      </div>
    </div>
  </div>
</div>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://gtgtbsylalibqhxztcta.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_1YHehRDqEXk2IRCJc3AmyA__8B5fe-x';

let supabaseClient = null;
let notesCache = [];
let currentNoteId = null;
let quill = null;
let authMode = 'login';

function escapeHtml(str) {
  let div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function stripHtml(html) {
  let div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || div.innerText || '';
}

function fmtDate(dateStr) {
  let d = new Date(dateStr + 'T00:00:00');
  let m = d.getMonth() + 1;
  let day = d.getDate();
  let weekdays = ['日','一','二','三','四','五','六'];
  return m + '月' + day + '日 周' + weekdays[d.getDay()];
}

function showToast(msg, type) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function getCurrentTags() {
  let tags = [];
  document.querySelectorAll('#tagList .tag-badge').forEach(el => {
    tags.push(el.getAttribute('data-tag'));
  });
  return tags;
}

function renderTags(tags) {
  let container = document.getElementById('tagList');
  container.innerHTML = tags.map(t =>
    '<span class="tag-badge" data-tag="' + escapeHtml(t) + '">' +
      escapeHtml(t) +
      '<span class="remove-tag" onclick="removeTag(\'' + escapeHtml(t).replace(/'/g, "\\'") + '\')">&times;</span>' +
    '</span>'
  ).join('');
  renderExistingTags();
}

function addTag() {
  let input = document.getElementById('tagInput');
  let tag = input.value.trim();
  if (!tag) return;
  let current = getCurrentTags();
  if (current.includes(tag)) {
    showToast('标签"' + tag + '"已存在', 'warning');
    input.value = '';
    return;
  }
  current.push(tag);
  renderTags(current);
  input.value = '';
  input.focus();
}

function removeTag(tag) {
  let current = getCurrentTags().filter(t => t !== tag);
  renderTags(current);
}

function togglePresetTag(tag) {
  let current = getCurrentTags();
  if (current.includes(tag)) {
    current = current.filter(t => t !== tag);
  } else {
    current.push(tag);
  }
  renderTags(current);
}

function renderExistingTags() {
  let allTags = new Set();
  notesCache.forEach(n => (n.tags || []).forEach(t => allTags.add(t)));
  if (allTags.size === 0) {
    document.getElementById('existingTags').style.display = 'none';
    return;
  }
  let currentTags = getCurrentTags();
  let html = '<span class="existing-tags-label"><i class="fas fa-tags"></i> 已有标签：</span>';
  allTags.forEach(tag => {
    let active = currentTags.includes(tag) ? 'active' : '';
    html += '<span class="preset-tag ' + active + '" onclick="togglePresetTag(\'' + escapeHtml(tag).replace(/'/g, "\\'") + '\')">' + escapeHtml(tag) + '</span>';
  });
  document.getElementById('existingTags').innerHTML = html;
  document.getElementById('existingTags').style.display = 'flex';
}

function clearForm() {
  currentNoteId = null;
  document.getElementById('noteDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('noteTitle').value = '';
  quill.root.innerHTML = '';
  renderTags([]);
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> 保存';
  document.getElementById('noteTitle').focus();
}

function showAuthError(msg) {
  let el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideAuthError() {
  document.getElementById('authError').style.display = 'none';
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  hideAuthError();
  if (authMode === 'register') {
    document.getElementById('confirmGroup').style.display = 'block';
    document.getElementById('authBtn').innerHTML = '<i class="fas fa-user-plus"></i> 注册';
    document.getElementById('authToggleText').textContent = '已有账号？';
    document.getElementById('authToggleLink').textContent = '立即登录';
  } else {
    document.getElementById('confirmGroup').style.display = 'none';
    document.getElementById('authBtn').innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
    document.getElementById('authToggleText').textContent = '没有账号？';
    document.getElementById('authToggleLink').textContent = '立即注册';
  }
}

async function handleAuth() {
  let email = document.getElementById('authEmail').value.trim();
  let password = document.getElementById('authPassword').value;
  if (!email) { showAuthError('请输入邮箱'); return; }
  if (!password) { showAuthError('请输入密码'); return; }
  if (password.length < 6) { showAuthError('密码至少6位'); return; }
  if (authMode === 'register') {
    let confirm = document.getElementById('authConfirm').value;
    if (password !== confirm) { showAuthError('两次密码不一致'); return; }
  }
  hideAuthError();
  let btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (authMode === 'login' ? '登录中...' : '注册中...');
  try {
    if (authMode === 'login') {
      let { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } else {
      let { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      showToast('注册成功', 'success');
    }
  } catch (e) {
    showAuthError(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = authMode === 'login'
      ? '<i class="fas fa-sign-in-alt"></i> 登录'
      : '<i class="fas fa-user-plus"></i> 注册';
  }
}

function showApp(email) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  if (email) document.getElementById('userEmail').textContent = email;
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appContent').style.display = 'none';
  notesCache = [];
  currentNoteId = null;
  document.getElementById('notesList').innerHTML = '';
  document.getElementById('searchInput').value = '';
  localStorage.removeItem('daily_notes_backup');
  if (quill) clearForm();
}

async function signOut() {
  let { error } = await supabaseClient.auth.signOut();
  if (error) showToast('退出失败：' + error.message, 'error');
}

async function saveNote() {
  let date = document.getElementById('noteDate').value;
  let title = document.getElementById('noteTitle').value.trim();
  let content = quill.root.innerHTML;
  let plainContent = stripHtml(content).trim();
  if (!title && !plainContent) {
    showToast('请填写笔记内容', 'warning');
    return;
  }
  if (!title) title = '无标题';
  let tags = getCurrentTags();
  let btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
  try {
    if (currentNoteId) {
      let { error } = await supabaseClient
        .from('daily_notes')
        .update({ title, content, date, tags, updated_at: new Date().toISOString() })
        .eq('id', currentNoteId);
      if (error) throw error;
    } else {
      let { data: { user } } = await supabaseClient.auth.getUser();
      let { data, error } = await supabaseClient
        .from('daily_notes')
        .insert({ title, content, date, tags, user_id: user.id })
        .select();
      if (error) throw error;
      currentNoteId = data[0].id;
    }
    showToast('保存成功', 'success');
    btn.innerHTML = '<i class="fas fa-save"></i> 保存';
    btn.disabled = false;
    document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> 保存';
    document.getElementById('cancelBtn').style.display = currentNoteId ? 'block' : 'none';
    await loadNotes();
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
    btn.innerHTML = '<i class="fas fa-save"></i> 保存';
    btn.disabled = false;
  }
}

async function deleteNote(id) {
  if (!confirm('确定要删除此笔记吗？')) return;
  try {
    let { error } = await supabaseClient.from('daily_notes').delete().eq('id', id);
    if (error) throw error;
    showToast('删除成功', 'success');
    if (currentNoteId === id) clearForm();
    await loadNotes();
  } catch (e) {
    showToast('删除失败：' + e.message, 'error');
  }
}

function editNote(id) {
  let note = notesCache.find(n => n.id === id);
  if (!note) return;
  currentNoteId = id;
  document.getElementById('noteDate').value = note.date;
  document.getElementById('noteTitle').value = note.title;
  quill.root.innerHTML = note.content || '';
  renderTags(note.tags || []);
  document.getElementById('cancelBtn').style.display = 'block';
  document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> 更新';
  document.getElementById('noteTitle').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderNotes(records) {
  let container = document.getElementById('notesList');
  if (!records || records.length === 0) {
    container.innerHTML = '<div class="empty"><i class="far fa-sticky-note"></i>暂无笔记<div class="empty"><p>开始记录你的第一篇笔记吧</p></div></div>';
    return;
  }
  let html = '';
  let currentDate = null;
  records.forEach(note => {
    if (note.date !== currentDate) {
      currentDate = note.date;
      html += '<div class="date-separator"><i class="far fa-calendar-alt"></i> ' + fmtDate(note.date) + '</div>';
    }
    let plainText = stripHtml(note.content);
    let snippet = plainText.substring(0, 150);
    if (plainText.length > 150) snippet += '...';
    let tagsHtml = (note.tags || []).map(t =>
      '<span class="tag-badge">' + escapeHtml(t) + '</span>'
    ).join('');
    html +=
      '<div class="note-item" onclick="editNote(\'' + note.id + '\')">' +
        '<div class="note-item-header">' +
          '<span class="note-item-title">' + escapeHtml(note.title || '无标题') + '</span>' +
          '<div class="note-item-meta">' +
            '<span class="note-item-date">' + note.date.slice(5) + '</span>' +
            '<span class="note-item-actions">' +
              '<button class="btn-icon btn-icon-danger" onclick="event.stopPropagation();deleteNote(\'' + note.id + '\')" title="删除"><i class="fas fa-trash-alt"></i></button>' +
            '</span>' +
          '</div>' +
        '</div>' +
        (snippet ? '<div class="note-item-snippet">' + escapeHtml(snippet) + '</div>' : '') +
        (tagsHtml ? '<div class="note-item-tags">' + tagsHtml + '</div>' : '') +
      '</div>';
  });
  container.innerHTML = html;
}

function backupToLocal(data) {
  try { localStorage.setItem('daily_notes_backup', JSON.stringify(data)); } catch (e) {}
}

function loadFromLocal() {
  try {
    let data = localStorage.getItem('daily_notes_backup');
    return data ? JSON.parse(data) : null;
  } catch (e) { return null; }
}

function performFilter(keyword) {
  if (!keyword) {
    renderNotes(notesCache);
    return;
  }
  let kw = keyword.toLowerCase();
  let filtered = notesCache.filter(n => {
    let title = (n.title || '').toLowerCase();
    let content = stripHtml(n.content || '').toLowerCase();
    return title.includes(kw) || content.includes(kw);
  });
  renderNotes(filtered);
}

let searchTimer = null;

function filterNotes() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    let keyword = document.getElementById('searchInput').value.trim();
    performFilter(keyword);
  }, 200);
}

async function loadNotes() {
  try {
    let { data, error } = await supabaseClient
      .from('daily_notes')
      .select('*')
      .order('date', { ascending: false });
    if (error) throw error;
    notesCache = data || [];
    backupToLocal(notesCache);
  } catch (e) {
    let local = loadFromLocal();
    if (local) {
      notesCache = local;
      showToast('网络不可用，显示本地缓存', 'warning');
    } else {
      notesCache = [];
      showToast('无法加载数据', 'error');
    }
  }
  let keyword = document.getElementById('searchInput').value.trim();
  if (keyword) {
    performFilter(keyword);
  } else {
    renderNotes(notesCache);
  }
  renderExistingTags();
}

document.getElementById('tagInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTag(); }
});

document.getElementById('noteDate').addEventListener('change', function() {
  if (!currentNoteId && quill) {
    let content = quill.root.innerHTML.trim();
    if (content === '<p><br></p>' || content === '') return;
  }
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveNote();
  }
});

document.addEventListener('DOMContentLoaded', async function() {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    quill = new Quill('#editorContainer', {
      theme: 'snow',
      placeholder: '开始记录今天的内容...',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          ['blockquote', 'code-block'],
          ['link'],
          ['clean']
        ]
      }
    });
    document.getElementById('noteDate').value = new Date().toISOString().slice(0, 10);
    showApp(session.user.email);
    loadNotes();
  } else {
    showLogin();
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      if (!quill) {
        quill = new Quill('#editorContainer', {
          theme: 'snow',
          placeholder: '开始记录今天的内容...',
          modules: {
            toolbar: [
              [{ 'header': [1, 2, 3, false] }],
              ['bold', 'italic', 'underline', 'strike'],
              [{ 'list': 'ordered'}, { 'list': 'bullet' }],
              ['blockquote', 'code-block'],
              ['link'],
              ['clean']
            ]
          }
        });
        document.getElementById('noteDate').value = new Date().toISOString().slice(0, 10);
      }
      showApp(session.user.email);
      loadNotes();
    } else if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
});
</script>
