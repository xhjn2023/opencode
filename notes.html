<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notes</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #f0f2f5; --surface: #fff; --surface2: #f7f8fa;
  --text: #1a1a2e; --text2: #5a5a7a; --text3: #9a9ab0;
  --border: #e4e6eb; --border2: #d0d2d8;
  --primary: #5b5bd7; --primary-hover: #4a4ac2; --primary-light: #eeedfc; --primary-text: #5b5bd7;
  --accent: #f59e0b; --accent-light: #fef3c7;
  --danger: #ef4444; --danger-light: #fef2f2;
  --success: #10b981; --success-light: #d1fae5;
  --shadow: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
  --radius: 10px; --radius-sm: 6px;
  --sidebar-w: 220px; --list-w: 320px;
  --nav-h: 48px;
  --font: -apple-system, "SF Pro Display", "Microsoft YaHei", sans-serif;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
[data-theme=dark] {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
  --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
  --border: #30363d; --border2: #21262d;
  --primary: #7c7cf0; --primary-hover: #6e6ee0; --primary-light: #1c1c3a; --primary-text: #a5a5ff;
  --accent: #fbbf24; --accent-light: #2a2410;
  --danger: #f87171; --danger-light: #2d1515;
  --success: #34d399; --success-light: #0c2a1e;
  --shadow: 0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html,body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); transition: background .3s,color .3s; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
button { font-family: inherit; }
a { color: var(--primary); text-decoration: none; }
input,textarea { font-family: inherit; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); padding: 10px 20px; border-radius: var(--radius-sm); color: #fff; font-size: 13px; font-weight: 500; z-index: 99999; opacity: 0; transition: all .3s ease; pointer-events: none; box-shadow: var(--shadow-lg); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--accent); }
.toast.info { background: var(--primary); }
#app { display: flex; height: 100vh; }
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px 16px 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.sidebar-header .logo { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
.sidebar-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); cursor: pointer; transition: all var(--transition); border: none; background: none; width: 100%; text-align: left; }
.nav-item i { width: 16px; font-size: 13px; text-align: center; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--primary-light); color: var(--primary-text); font-weight: 500; }
.nav-item .badge { margin-left: auto; font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--surface2); color: var(--text3); }
.nav-item.active .badge { background: var(--primary); color: #fff; }
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: var(--nav-h); display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.topbar .search-wrap { flex: 1; position: relative; max-width: 420px; }
.topbar .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: none; border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--surface2); color: var(--text); }
.topbar .search-wrap input:focus { background: var(--surface); box-shadow: 0 0 0 2px var(--primary-light); }
.topbar .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text3); pointer-events: none; }
.topbar-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.topbar-right .btn-icon { padding: 6px; border-radius: var(--radius-sm); color: var(--text3); font-size: 14px; background: none; border: none; cursor: pointer; }
.topbar-right .btn-icon:hover { background: var(--surface2); color: var(--text); }
.topbar-right .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light); color: var(--primary-text); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; }
.content-area { flex: 1; display: flex; min-height: 0; }
.note-list-panel { width: var(--list-w); border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0; }
.panel-header { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-header h3 { font-size: 14px; font-weight: 600; color: var(--text); }
.panel-header .count { font-size: 12px; color: var(--text3); }
.list-toolbar { display: flex; gap: 4px; padding: 0 12px 8px; flex-shrink: 0; flex-wrap: wrap; }
.list-toolbar .chip { padding: 3px 10px; border-radius: 14px; font-size: 11px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
.list-toolbar .chip:hover { border-color: var(--primary); color: var(--primary); }
.list-toolbar .chip.active { background: var(--primary-light); border-color: var(--primary-light); color: var(--primary-text); }
.note-list-scroll { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.note-card { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all .12s; border: 1px solid transparent; margin-bottom: 2px; position: relative; }
.note-card:hover { background: var(--surface2); }
.note-card.selected { background: var(--primary-light); border-color: var(--primary); }
.note-card .nc-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
.note-card .nc-title .pin-icon { font-size: 10px; color: var(--accent); }
.note-card .nc-snippet { font-size: 12px; color: var(--text3); line-height: 1.5; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.note-card .nc-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 11px; color: var(--text3); flex-wrap: wrap; }
.note-card .nc-meta .nc-tag { padding: 1px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary-text); font-size: 10px; }
.note-card .nc-actions { position: absolute; top: 6px; right: 6px; display: none; gap: 2px; }
.note-card:hover .nc-actions { display: flex; }
.note-card .nc-actions .btn-icon { padding: 3px 5px; font-size: 11px; border-radius: 4px; color: var(--text3); background: none; border: none; cursor: pointer; }
.note-card .nc-actions .btn-icon:hover { background: var(--border); color: var(--text); }
.note-card .nc-actions .btn-icon.pin-active { color: var(--accent); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 13px; }
.empty-state i { font-size: 32px; margin-bottom: 12px; opacity: .4; }
.editor-panel { flex: 1; display: flex; flex-direction: column; background: var(--surface); min-width: 0; }
.editor-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text3); font-size: 14px; padding: 40px; text-align: center; }
.editor-empty i { font-size: 48px; opacity: .2; margin-bottom: 16px; }
.editor-empty h2 { font-size: 18px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
.editor-empty p { font-size: 13px; max-width: 280px; line-height: 1.6; }
.editor-toolbar { display: none; padding: 8px 16px 4px; gap: 8px; align-items: center; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.editor-toolbar.show { display: flex; }
.editor-toolbar .et-left { flex: 1; min-width: 0; }
.editor-toolbar .et-left input { border: none; background: none; font-size: 16px; font-weight: 600; color: var(--text); outline: none; width: 100%; padding: 4px 0; }
.editor-toolbar .et-left input::placeholder { color: var(--text3); }
.editor-toolbar .et-date { font-size: 11px; color: var(--text3); white-space: nowrap; }
.editor-toolbar .et-right { display: flex; gap: 4px; flex-shrink: 0; }
.editor-toolbar .et-right .btn-icon { padding: 5px; border-radius: 4px; font-size: 13px; color: var(--text3); background: none; border: none; cursor: pointer; }
.editor-toolbar .et-right .btn-icon:hover { background: var(--surface2); color: var(--text); }
.editor-body { display: none; flex: 1; flex-direction: column; min-height: 0; }
.editor-body.show { display: flex; }
.editor-body #editor-container { flex: 1; display: flex; flex-direction: column; }
.editor-body .ql-toolbar { border: none; border-radius: 0; background: transparent; padding: 4px 12px; border-bottom: 1px solid var(--border); }
.editor-body .ql-container { border: none; font-size: 14px; }
.editor-body .ql-editor { padding: 16px 20px; }
.editor-body .ql-editor.ql-blank::before { color: var(--text3); font-style: normal; }
.editor-footer { display: none; padding: 6px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); align-items: center; gap: 12px; flex-shrink: 0; }
.editor-footer.show { display: flex; }
.editor-footer .save-status { display: flex; align-items: center; gap: 4px; }
.editor-footer .tag-bar { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; }
.editor-footer .tag-bar .tag-edit { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary-text); font-size: 10px; cursor: pointer; }
.editor-footer .tag-bar .tag-edit .remove { cursor: pointer; opacity: .5; }
.editor-footer .tag-bar .tag-edit .remove:hover { opacity: 1; }
.editor-footer .tag-bar input { border: none; background: none; font-size: 11px; color: var(--text3); outline: none; width: 60px; padding: 2px; }
.dashboard { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 24px 28px; }
.dashboard.show { display: flex; }
.db-header { margin-bottom: 24px; }
.db-header h2 { font-size: 20px; font-weight: 700; }
.db-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }
.db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
.db-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.db-card .db-value { font-size: 24px; font-weight: 700; color: var(--primary); }
.db-card .db-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.heatmap-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 28px; overflow-x: auto; }
.heatmap-wrap canvas { display: block; }
.recent-notes { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.recent-card { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }
.recent-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.recent-card .rc-title { font-size: 13px; font-weight: 600; color: var(--text); }
.recent-card .rc-snippet { font-size: 12px; color: var(--text3); margin-top: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.recent-card .rc-date { font-size: 11px; color: var(--text3); margin-top: 6px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; justify-content: center; align-items: flex-start; padding-top: 80px; z-index: 9998; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal-box { width: 520px; max-width: 90vw; background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden; }
.modal-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-header .close-btn { padding: 4px 8px; border-radius: 4px; color: var(--text3); background: none; border: none; cursor: pointer; }
.modal-header .close-btn:hover { background: var(--surface2); }
.modal-body { padding: 12px 20px 20px; }
.modal-body .qc-title { width: 100%; padding: 8px 0; border: none; background: none; font-size: 16px; font-weight: 600; color: var(--text); outline: none; }
.modal-footer { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.modal-footer .btn { padding: 7px 16px; font-size: 13px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; }
.modal-footer .btn-primary { background: var(--primary); color: #fff; }
.modal-footer .btn-primary:hover { background: var(--primary-hover); }
.modal-footer .qc-tag-input { border: none; background: none; font-size: 12px; color: var(--text3); outline: none; width: 70px; }
.user-dropdown { position: absolute; top: 44px; right: 8px; width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); display: none; z-index: 100; }
.user-dropdown.show { display: block; }
.user-dropdown .ud-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
.user-dropdown .ud-item:hover { background: var(--surface2); color: var(--text); }
@media (max-width: 900px) {
  .sidebar { display: none; }
  .note-list-panel { width: 100%; }
  .editor-panel { display: none; }
  .editor-panel.show-mobile { display: flex; position: fixed; inset: 0; z-index: 50; background: var(--surface); }
  .sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 60; width: 260px; }
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="showConfig()">
      <div class="logo"><i class="fas fa-feather"></i></div>
      <h2>Notes</h2>
      <span style="font-size:11px;color:var(--text3);">设置</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="switchView('all')"><i class="far fa-file-alt"></i> 所有笔记 <span class="badge" id="badgeAll">0</span></button>
      <button class="nav-item" onclick="switchView('today')"><i class="far fa-calendar-check"></i> 今天</button>
      <button class="nav-item" onclick="switchView('favorites')"><i class="far fa-star"></i> 收藏</button>
      <button class="nav-item" onclick="switchView('archive')"><i class="far fa-archive"></i> 归档 <span class="badge" id="badgeArchive">0</span></button>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      <button class="nav-item" onclick="showQuickCapture()" style="color:var(--primary);"><i class="fas fa-plus"></i> 快速记录</button>
    </nav>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button class="btn-icon" onclick="toggleSidebar()" style="display:none;" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="onSearch()">
      </div>
      <div class="topbar-right">
        <span style="font-size:12px;color:var(--text3);" id="userLabel"></span>
        <button class="btn-icon" onclick="toggleDarkMode()" id="dmBtn" title="深色模式"><i class="fas fa-moon"></i></button>
        <div style="position:relative;">
          <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">N</div>
          <div class="user-dropdown" id="userMenu">
            <button class="ud-item" onclick="showConfig()"><i class="fas fa-cog"></i> 设置</button>
            <button class="ud-item" onclick="exportAll()"><i class="fas fa-download"></i> 导出全部</button>
            <button class="ud-item" onclick="importNotes()"><i class="fas fa-upload"></i> 导入</button>
          </div>
        </div>
      </div>
    </div>
    <div class="content-area">
      <div class="note-list-panel" id="noteListPanel">
        <div class="panel-header"><h3 id="listTitle">所有笔记</h3><span class="count" id="listCount">0 篇</span></div>
        <div class="list-toolbar">
          <button class="chip active" onclick="setSort('newest')">最新</button>
          <button class="chip" onclick="setSort('oldest')">最早</button>
          <button class="chip" onclick="setSort('pinned')">置顶</button>
        </div>
        <div class="note-list-scroll" id="noteListScroll"></div>
      </div>
      <div class="editor-panel" id="editorPanel">
        <div class="editor-empty" id="editorEmpty">
          <i class="far fa-file-alt"></i>
          <h2>选择或创建一篇笔记</h2>
          <p>点击 <i class="fas fa-plus" style="color:var(--primary);"></i> 快速记录新想法</p>
        </div>
        <div class="editor-toolbar" id="editorToolbar">
          <div class="et-left"><input type="text" id="noteTitle" placeholder="笔记标题"></div>
          <div class="et-right">
            <span class="et-date" id="noteDateDisplay"></span>
            <button class="btn-icon" id="pinBtn" onclick="togglePinCurrent()" title="置顶"><i class="fas fa-thumbtack"></i></button>
            <button class="btn-icon" id="favBtn" onclick="toggleFavCurrent()" title="收藏"><i class="far fa-star"></i></button>
            <button class="btn-icon" onclick="exportCurrent()" title="导出"><i class="fas fa-download"></i></button>
            <button class="btn-icon" onclick="archiveCurrent()" title="归档"><i class="fas fa-archive"></i></button>
          </div>
        </div>
        <div class="editor-body" id="editorBody">
          <div id="editorContainer"></div>
        </div>
        <div class="editor-footer" id="editorFooter">
          <div class="tag-bar" id="tagBar"></div>
          <span class="save-status" id="saveStatus">已保存</span>
        </div>
      </div>
      <div class="dashboard show" id="dashboard">
        <div class="db-header"><h2>概览</h2><p id="dashGreeting"></p></div>
        <div class="db-grid">
          <div class="db-card"><div class="db-value" id="dashNotes">0</div><div class="db-label">总笔记</div></div>
          <div class="db-card"><div class="db-value" id="dashWords">0</div><div class="db-label">总字数</div></div>
          <div class="db-card"><div class="db-value" id="dashStreak">0</div><div class="db-label">连续记录</div></div>
          <div class="db-card"><div class="db-value" id="dashToday">0</div><div class="db-label">今日已写</div></div>
        </div>
        <div class="db-section-title">记录热力图</div>
        <div class="heatmap-wrap"><canvas id="heatmap" height="120"></canvas></div>
        <div class="db-section-title">最近的笔记</div>
        <div class="recent-notes" id="recentNotes"></div>
      </div>
    </div>
  </div>
</div>

<!-- Quick Capture -->
<div class="modal-overlay" id="qcModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>快速记录</h3>
      <button class="close-btn" onclick="hideQuickCapture()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input class="qc-title" id="qcTitle" placeholder="标题（可选）">
      <div id="qcEditor" style="min-height:120px;"></div>
    </div>
    <div class="modal-footer">
      <input class="qc-tag-input" id="qcTagInput" placeholder="#标签" onkeydown="if(event.key==='Enter'){event.preventDefault();addQcTag();}">
      <button class="btn btn-primary" onclick="saveQuickCapture()">保存</button>
    </div>
  </div>
</div>

<!-- Config Modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal-box" style="max-width:420px;">
    <div class="modal-header">
      <h3>设置</h3>
      <button class="close-btn" onclick="hideConfig()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px;">API 服务器地址</label>
        <input type="url" id="configApiUrl" value="http://localhost:3333" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px;">你的名字</label>
        <input type="text" id="configName" value="" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;">
      </div>
      <div style="font-size:12px;color:var(--text3);line-height:1.6;">
        <p>确保 Node.js 后端已启动：</p>
        <code style="display:block;padding:8px;background:var(--surface2);border-radius:4px;margin-top:4px;">node server.js</code>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveConfig()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
// ─── Config ───
let API = localStorage.getItem('api_base') || 'http://localhost:3333';
let userName = localStorage.getItem('user_name') || '我';
let notes = [];
let quill, qcQuill;
let currentNoteId = null, selectedNoteId = null;
let currentView = 'all', currentSort = 'newest', searchTerm = '';
let isDark = localStorage.getItem('dn_dark') === 'true';
let saveTimer = null, saving = false;

function $(id){return document.getElementById(id);}
function esc(s){let d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function strip(html){let d=document.createElement('div');d.innerHTML=html;return d.textContent||'';}
function dateStr(d){return d.toISOString().slice(0,10);}
function fmtDate(s){let d=new Date(s+'T00:00:00');return (d.getMonth()+1)+'月'+d.getDate()+'日 周' + ['日','一','二','三','四','五','六'][d.getDay()];}

// ─── Toast ───
function toast(msg,type){
  let t=$('toast');t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

// ─── Config ───
function showConfig(){
  $('configApiUrl').value=API;
  $('configName').value=userName;
  $('configModal').classList.add('show');
}
function hideConfig(){$('configModal').classList.remove('show');}
function saveConfig(){
  API=$('configApiUrl').value.replace(/\/+$/,'');
  userName=$('configName').value.trim()||'我';
  localStorage.setItem('api_base',API);
  localStorage.setItem('user_name',userName);
  updateUserUI();
  hideConfig();
  loadNotes();
  toast('设置已保存','success');
}

// ─── API calls ───
async function apiGet(url){let r=await fetch(API+url);if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPost(url,body){let r=await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPut(url,body){let r=await fetch(API+url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiDel(url){let r=await fetch(API+url,{method:'DELETE'});if(!r.ok)throw new Error(r.statusText);return r.json();}

// ─── Dark mode ───
function applyDark(){document.documentElement.setAttribute('data-theme','dark');$('dmBtn').innerHTML='<i class="fas fa-sun"></i>';}
function applyLight(){document.documentElement.removeAttribute('data-theme');$('dmBtn').innerHTML='<i class="fas fa-moon"></i>';}
function toggleDarkMode(){isDark=!isDark;localStorage.setItem('dn_dark',isDark);isDark?applyDark():applyLight();}
if(isDark)applyDark();

// ─── UI ───
function updateUserUI(){
  $('userLabel').textContent=userName;
  $('userAvatar').textContent=userName.charAt(0).toUpperCase();
}
function toggleSidebar(){
  if(innerWidth<=900)$('sidebar').classList.toggle('mobile-show');
}
function toggleUserMenu(){$('userMenu').classList.toggle('show');}
document.addEventListener('click',function(e){let m=$('userMenu');if(!e.target.closest('.user-avatar')&&!e.target.closest('.user-dropdown'))m.classList.remove('show');});

// ─── Views ───
function switchView(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.nav-item[onclick*="'${view}'"]`)?.classList.add('active');
  $('listTitle').textContent={'all':'所有笔记','today':'今天','favorites':'收藏','archive':'归档'}[view]||'笔记';
  if(innerWidth<=900)$('sidebar').classList.remove('mobile-show');
  applyFilters();
}

// ─── Load ───
async function loadNotes(){
  try{
    let data=await apiGet('/api/notes');
    notes=data||[];
    localStorage.setItem('dn_backup',JSON.stringify(notes));
  }catch(e){
    let local=localStorage.getItem('dn_backup');
    if(local){notes=JSON.parse(local);toast('无法连接服务器，显示缓存数据','warning');}
    else notes=[];
  }
  applyFilters();updateDashboard();
  $('badgeAll').textContent=notes.filter(n=>!n.archived).length;
  $('badgeArchive').textContent=notes.filter(n=>n.archived).length;
}

// ─── Filter ───
function applyFilters(){
  let filtered=[...notes];
  if(currentView==='today')filtered=filtered.filter(n=>n.date===dateStr(new Date()));
  else if(currentView==='favorites')filtered=filtered.filter(n=>n.favorite&&!n.archived);
  else if(currentView==='archive')filtered=filtered.filter(n=>n.archived);
  else filtered=filtered.filter(n=>!n.archived);
  if(searchTerm){
    let kw=searchTerm.toLowerCase();
    filtered=filtered.filter(n=>(n.title||'').toLowerCase().includes(kw)||strip(n.content||'').toLowerCase().includes(kw));
  }
  if(currentSort==='pinned')filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.date.localeCompare(a.date));
  else if(currentSort==='oldest')filtered.sort((a,b)=>a.date.localeCompare(b.date)||(a.created_at||'').localeCompare(b.created_at||''));
  else filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.date.localeCompare(a.date)||(b.created_at||'').localeCompare(a.created_at||''));
  renderList(filtered);
  $('listCount').textContent=filtered.length+' 篇';
}
function setSort(s){currentSort=s;document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('active',el.textContent.includes({'newest':'最新',oldest:'最早',pinned:'置顶'}[s])));applyFilters();}
function onSearch(){searchTerm=$('searchInput').value.trim();applyFilters();}

// ─── Render list ───
function renderList(list){
  let el=$('noteListScroll');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="empty-state"><i class="far fa-file-alt"></i>没有笔记</div>';return;}
  let cd=null;
  list.forEach(n=>{
    if(n.date!==cd){cd=n.date;
      let sep=document.createElement('div');sep.style.cssText='padding:12px 4px 4px;font-size:11px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);margin-bottom:4px;';
      sep.textContent=fmtDate(n.date);el.appendChild(sep);
    }
    let c=document.createElement('div');c.className='note-card'+(n.id===selectedNoteId?' selected':'');
    let tags=(n.tags||[]).slice(0,3).map(t=>'<span class="nc-tag">'+esc(t)+'</span>').join('');
    let snip=strip(n.content||'').substring(0,120);
    c.innerHTML=
      '<div class="nc-title">'+(n.pinned?'<span class="pin-icon"><i class="fas fa-thumbtack"></i></span>':'')+esc(n.title||'无标题')+'</div>'+
      (snip?'<div class="nc-snippet">'+esc(snip)+'</div>':'')+
      '<div class="nc-meta">'+(tags?'<span>'+tags+'</span>':'')+(n.favorite?'<i class="fas fa-star" style="color:var(--accent);font-size:10px;"></i>':'')+'</div>'+
      '<div class="nc-actions">'+
        '<button class="btn-icon'+(n.pinned?' pin-active':'')+'" onclick="event.stopPropagation();togglePin(\''+n.id+'\')"><i class="fas fa-thumbtack"></i></button>'+
        '<button class="btn-icon" onclick="event.stopPropagation();toggleFav(\''+n.id+'\')"><i class="'+(n.favorite?'fas':'far')+' fa-star"></i></button>'+
        '<button class="btn-icon" onclick="event.stopPropagation();archiveNote(\''+n.id+'\')"><i class="fas fa-archive"></i></button>'+
      '</div>';
    c.onclick=()=>openNote(n.id);
    el.appendChild(c);
  });
}

// ─── Open / Edit ───
function openNote(id){
  let n=notes.find(x=>x.id===id);if(!n)return;
  selectedNoteId=n.id;currentNoteId=n.id;
  $('editorEmpty').style.display='none';$('editorToolbar').classList.add('show');$('editorBody').classList.add('show');$('editorFooter').classList.add('show');
  $('dashboard').classList.remove('show');
  $('noteTitle').value=n.title||'';
  $('noteDateDisplay').textContent=n.date;
  if(!quill)initQuill();
  quill.root.innerHTML=n.content||'';
  renderTagBar(n.tags||[]);
  updatePinFavBtns(n);
  applyFilters();
  $('saveStatus').textContent='已保存';
  if(innerWidth<=900)$('editorPanel').classList.add('show-mobile');
}
function clearEditor(){
  currentNoteId=null;selectedNoteId=null;
  $('editorEmpty').style.display='flex';$('editorToolbar').classList.remove('show');$('editorBody').classList.remove('show');$('editorFooter').classList.remove('show');
  if(quill)quill.root.innerHTML='';$('noteTitle').value='';$('tagBar').innerHTML='';
  $('dashboard').classList.add('show');
  if(innerWidth<=900)$('editorPanel').classList.remove('show-mobile');
}

// ─── Tag bar ───
function renderTagBar(tags){
  let el=$('tagBar');el.innerHTML='';
  tags.forEach(t=>{
    let s=document.createElement('span');s.className='tag-edit';
    s.innerHTML=esc(t)+' <span class="remove" onclick="event.stopPropagation();removeEditorTag(\''+esc(t).replace(/'/g,"\\'")+'\')">&times;</span>';
    el.appendChild(s);
  });
  let inp=document.createElement('input');inp.placeholder='+标签';
  inp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();addEditorTag(this.value);this.value='';}};
  el.appendChild(inp);
}
function addEditorTag(tag){tag=tag.trim().replace(/^#+/,'');if(!tag)return;
  let c=getEditorTags();if(c.includes(tag))return;c.push(tag);renderTagBar(c);autoSave();}
function removeEditorTag(tag){let c=getEditorTags().filter(t=>t!==tag);renderTagBar(c);autoSave();}
function getEditorTags(){let t=[];$('tagBar').querySelectorAll('.tag-edit').forEach(el=>t.push(el.childNodes[0].textContent.trim()));return t;}
function updatePinFavBtns(n){$('pinBtn').className='btn-icon'+(n.pinned?' pin-active':'');$('favBtn').innerHTML='<i class="'+(n.favorite?'fas':'far')+' fa-star"></i>';}

// ─── CRUD ───
async function togglePin(id){
  let n=notes.find(x=>x.id===id);if(!n)return;
  let v=!n.pinned;
  try{await apiPut('/api/notes/'+id,{pinned:v});n.pinned=v;applyFilters();toast(v?'已置顶':'已取消置顶','success');}catch(e){toast('操作失败','error');}
}
async function togglePinCurrent(){
  if(!currentNoteId)return;let n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let v=!n.pinned;
  try{await apiPut('/api/notes/'+currentNoteId,{pinned:v});n.pinned=v;updatePinFavBtns(n);applyFilters();toast(v?'已置顶':'已取消置顶','success');}catch(e){toast('操作失败','error');}
}
async function toggleFav(id){
  let n=notes.find(x=>x.id===id);if(!n)return;
  let v=!n.favorite;
  try{await apiPut('/api/notes/'+id,{favorite:v});n.favorite=v;applyFilters();toast(v?'已收藏':'已取消收藏','success');}catch(e){toast('操作失败','error');}
}
async function toggleFavCurrent(){
  if(!currentNoteId)return;let n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let v=!n.favorite;
  try{await apiPut('/api/notes/'+currentNoteId,{favorite:v});n.favorite=v;updatePinFavBtns(n);applyFilters();}catch(e){toast('操作失败','error');}
}
async function archiveNote(id){
  try{await apiPut('/api/notes/'+id,{archived:true});toast('已归档','success');if(currentNoteId===id)clearEditor();loadNotes();}catch(e){toast('归档失败','error');}
}
async function archiveCurrent(){
  if(!currentNoteId)return;
  try{await apiPut('/api/notes/'+currentNoteId,{archived:true});toast('已归档','success');clearEditor();loadNotes();}catch(e){toast('归档失败','error');}
}

// ─── Save ───
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{if(currentNoteId)saveNote();},2000);$('saveStatus').textContent='未保存';}
async function saveNote(){
  if(!currentNoteId||saving)return;
  let title=$('noteTitle').value.trim()||'无标题';
  let content=quill?quill.root.innerHTML:'';
  let tags=getEditorTags();
  saving=true;$('saveStatus').textContent='保存中...';
  try{
    await apiPut('/api/notes/'+currentNoteId,{title,content,tags});
    $('saveStatus').textContent='已保存';
    let n=notes.find(x=>x.id===currentNoteId);if(n){n.title=title;n.content=content;n.tags=tags;}
    applyFilters();updateDashboard();
  }catch(e){$('saveStatus').textContent='保存失败';toast('保存失败','error');}
  finally{saving=false;}
}

// ─── Quick Capture ───
function showQuickCapture(){
  $('qcModal').classList.add('show');$('qcTitle').value='';
  if(!qcQuill)qcQuill=new Quill('#qcEditor',{theme:'snow',placeholder:'写点什么...',modules:{toolbar:[['bold','italic','underline'],[{list:'bullet'}],['link']]}});
  else qcQuill.root.innerHTML='';
  $('qcTags')?.querySelectorAll('.qc-tag').forEach(el=>el.remove());
  setTimeout(()=>$('qcTitle').focus(),100);
}
function hideQuickCapture(){$('qcModal').classList.remove('show');}
function addQcTag(){let inp=$('qcTagInput'),tag=inp.value.trim().replace(/^#+/,'');if(!tag)return;inp.value='';inp.focus();}
async function saveQuickCapture(){
  let title=$('qcTitle').value.trim()||'无标题';
  let content=qcQuill?qcQuill.root.innerHTML:'';
  if(!strip(content).trim()&&!title){toast('请输入内容','warning');return;}
  let btn=$('qcModal').querySelector('.btn-primary');btn.disabled=true;btn.textContent='保存中...';
  try{
    await apiPost('/api/notes',{title,content,date:dateStr(new Date()),tags:[]});
    toast('已保存','success');hideQuickCapture();loadNotes();
  }catch(e){toast('保存失败：'+e.message,'error');}
  finally{btn.disabled=false;btn.textContent='保存';}
}

// ─── Export / Import ───
function exportCurrent(){
  let n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let md='# '+(n.title||'无标题')+'\n\n日期：'+n.date+'\n\n---\n\n'+strip(n.content||'');
  let b=new Blob([md],{type:'text/markdown;charset=utf-8'}),u=URL.createObjectURL(b);
  let a=document.createElement('a');a.href=u;a.download=(n.title||'note')+'_'+n.date+'.md';a.click();URL.revokeObjectURL(u);
  toast('已导出','success');
}
function exportAll(){
  $('userMenu').classList.remove('show');
  let md='# 笔记导出\n\n共 '+notes.length+' 篇\n\n---\n\n';
  notes.forEach(n=>{md+='## '+(n.title||'无标题')+'\n\n日期：'+n.date+'\n\n'+strip(n.content||'')+'\n\n---\n\n';});
  let b=new Blob([md],{type:'text/markdown;charset=utf-8'}),u=URL.createObjectURL(b);
  let a=document.createElement('a');a.href=u;a.download='notes_export_'+dateStr(new Date())+'.md';a.click();URL.revokeObjectURL(u);
  toast('已导出 '+notes.length+' 篇','success');
}
function importNotes(){
  $('userMenu').classList.remove('show');
  let inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async function(){
    try{
      let text=await this.files[0].text();let data=JSON.parse(text);
      if(!Array.isArray(data)){toast('格式错误','error');return;}
      for(let n of data){await apiPost('/api/notes',{title:n.title,content:n.content,date:n.date,tags:n.tags||[]});}
      toast('已导入 '+data.length+' 篇','success');loadNotes();
    }catch(e){toast('导入失败','error');}
  };inp.click();
}

// ─── Dashboard ───
function updateDashboard(){
  let active=notes.filter(n=>!n.archived);
  $('dashNotes').textContent=active.length;
  let words=0;active.forEach(n=>words+=strip(n.content||'').length);
  $('dashWords').textContent=words;
  $('dashToday').textContent=active.filter(n=>n.date===dateStr(new Date())).length;
  let days=[...new Set(active.map(n=>n.date))].sort().reverse();
  let streak=0,check=new Date(dateStr(new Date())+'T00:00:00');
  for(let i=0;i<days.length;i++){if(Math.round((check-new Date(days[i]+'T00:00:00'))/(86400000))===streak)streak++;else break;}
  $('dashStreak').textContent=streak;
  let recent=active.slice(0,12);
  $('recentNotes').innerHTML=recent.map(n=>'<div class="recent-card" onclick="openNote(\''+n.id+'\')"><div class="rc-title">'+esc(n.title||'无标题')+'</div><div class="rc-snippet">'+esc(strip(n.content||'').substring(0,100))+'</div><div class="rc-date">'+fmtDate(n.date)+'</div></div>').join('')||'<div style="color:var(--text3);font-size:13px;">还没有笔记</div>';
  drawHeatmap(active);
}
function drawHeatmap(records){
  let c=$('heatmap'),ctx=c.getContext('2d'),W=c.parentElement.clientWidth-32||600;
  c.width=W;c.height=120;
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface2').trim()||'#f7f8fa';
  ctx.fillRect(0,0,c.width,c.height);
  let dayMap={};records.forEach(n=>{if(n.date)dayMap[n.date]=(dayMap[n.date]||0)+1;});
  let today=new Date(),start=new Date(today);start.setDate(start.getDate()-83);
  let cellW=Math.floor((W-40)/85),cellH=12,gap=3;
  let max=Math.max(...Object.values(dayMap),1);
  let colors=document.documentElement.getAttribute('data-theme')==='dark'?['#161b22','#0e4429','#006d32','#26a641','#39d353']:['#ebedf0','#9be9a8','#40c463','#30a14e','#216e39'];
  for(let i=0;i<85;i++){let d=new Date(start);d.setDate(d.getDate()+i);let ds=dateStr(d),val=dayMap[ds]||0;ctx.fillStyle=colors[val===0?0:Math.min(Math.ceil((val/max)*4),4)];ctx.fillRect(20+i*(cellW+gap),10,cellW,cellH);}
}

// ─── Quill ───
function initQuill(){
  if(quill)return;
  quill=new Quill('#editorContainer',{theme:'snow',placeholder:'开始书写...',modules:{toolbar:[
    [{header:[1,2,3,false]}],['bold','italic','underline','strike'],
    [{list:'ordered'},{list:'bullet'},{list:'check'}],['blockquote','code-block'],
    [{script:'sub'},{script:'super'}],[{indent:'-1'},{indent:'+1'}],
    [{color:[]},{background:[]}],['link','image'],['clean']
  ]}});
  quill.on('text-change',()=>{if(currentNoteId)autoSave();});
  $('noteTitle').addEventListener('input',()=>{if(currentNoteId)autoSave();});
  $('editorContainer').addEventListener('paste',function(e){
    let items=(e.clipboardData||e.originalEvent?.clipboardData)?.items;if(!items)return;
    for(let item of items){if(item.type.indexOf('image')===0){e.preventDefault();let b=item.getAsFile(),r=new FileReader();
      r.onload=ev=>{let qs=quill.getSelection();if(qs)quill.clipboard.dangerouslyPasteHTML(qs.index,'<img src="'+ev.target.result+'" style="max-width:100%">');else quill.clipboard.dangerouslyPasteHTML(quill.getLength(),'<img src="'+ev.target.result+'" style="max-width:100%">');if(currentNoteId)autoSave();};
      r.readAsDataURL(b);return;}}
  });
}

// ─── Init ───
document.addEventListener('DOMContentLoaded',function(){
  updateUserUI();
  let h=new Date().getHours();
  $('dashGreeting').textContent=(h<12?'早上好':h<18?'下午好':'晚上好')+', '+userName+'。';
  loadNotes();
});

// ─── Keyboard ───
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if($('qcModal').classList.contains('show')){if(e.key==='Escape')hideQuickCapture();return;}
  if(e.key==='n'||e.key==='N'){e.preventDefault();showQuickCapture();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(currentNoteId)saveNote();}
});
</script>
</body>
</html>
