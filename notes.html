<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notes</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #f0f2f5; --surface: #fff; --surface2: #f7f8fa;
  --text: #1a1a2e; --text2: #5a5a7a; --text3: #9a9ab0;
  --border: #e4e6eb; --border2: #d0d2d8;
  --primary: #5b5bd7; --primary-hover: #4a4ac2; --primary-light: #eeedfc; --primary-text: #5b5bd7;
  --accent: #f59e0b; --accent-light: #fef3c7;
  --danger: #ef4444; --danger-light: #fef2f2;
  --success: #10b981; --success-light: #d1fae5;
  --shadow: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
  --radius: 10px; --radius-sm: 6px;
  --sidebar-w: 220px; --list-w: 320px;
  --nav-h: 48px;
  --font: -apple-system, "SF Pro Display", "Microsoft YaHei", sans-serif;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
[data-theme=dark] {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
  --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
  --border: #30363d; --border2: #21262d;
  --primary: #7c7cf0; --primary-hover: #6e6ee0; --primary-light: #1c1c3a; --primary-text: #a5a5ff;
  --accent: #fbbf24; --accent-light: #2a2410;
  --danger: #f87171; --danger-light: #2d1515;
  --success: #34d399; --success-light: #0c2a1e;
  --shadow: 0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html,body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); transition: background .3s,color .3s; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
button { font-family: inherit; }
a { color: var(--primary); text-decoration: none; }
input,textarea { font-family: inherit; }

/* ─── Toast ─── */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); padding: 10px 20px; border-radius: var(--radius-sm); color: #fff; font-size: 13px; font-weight: 500; z-index: 99999; opacity: 0; transition: all .3s ease; pointer-events: none; box-shadow: var(--shadow-lg); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--accent); }
.toast.info { background: var(--primary); }

/* ─── Login ─── */
#loginPage { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: var(--bg); z-index: 100; }
#loginPage.show { display: flex; }
.login-card { width: 380px; padding: 40px 32px 32px; background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg); }
.login-card h1 { font-size: 22px; text-align: center; margin-bottom: 4px; }
.login-card .sub { text-align: center; color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.login-card .fg { margin-bottom: 16px; }
.login-card .fg:last-child { margin-bottom: 0; }
.login-card label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; outline: none; background: var(--surface); color: var(--text); transition: border var(--transition); }
.login-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.login-card .btn-primary { width: 100%; justify-content: center; padding: 11px; margin-top: 4px; }
.auth-err { display: none; color: var(--danger); font-size: 13px; text-align: center; padding: 8px; background: var(--danger-light); border-radius: var(--radius-sm); margin-bottom: 12px; }
.auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text2); }
.auth-footer a { color: var(--primary); cursor: pointer; }
.auth-footer a:hover { text-decoration: underline; }

/* ─── App Shell ─── */
#app { display: none; height: 100vh; }
#app.show { display: flex; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: background .3s; }
.sidebar-header { padding: 16px 16px 8px; display: flex; align-items: center; gap: 10px; }
.sidebar-header .logo { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
.sidebar-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
.sidebar-header .btn-icon { color: var(--text3); font-size: 14px; padding: 6px; border-radius: var(--radius-sm); }
.sidebar-header .btn-icon:hover { background: var(--surface2); color: var(--text); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 8px; }
.nav-section { margin-bottom: 4px; }
.nav-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); padding: 8px 12px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); cursor: pointer; transition: all var(--transition); border: none; background: none; width: 100%; text-align: left; }
.nav-item i { width: 16px; font-size: 13px; text-align: center; flex-shrink: 0; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--primary-light); color: var(--primary-text); font-weight: 500; }
.nav-item .badge { margin-left: auto; font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--surface2); color: var(--text3); font-weight: 500; }
.nav-item.active .badge { background: var(--primary); color: #fff; }
.nav-item .notebook-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Main area */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: var(--nav-h); display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; transition: background .3s; }
.topbar .search-wrap { flex: 1; position: relative; max-width: 420px; }
.topbar .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: none; border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--surface2); color: var(--text); transition: all var(--transition); }
.topbar .search-wrap input:focus { background: var(--surface); box-shadow: 0 0 0 2px var(--primary-light); }
.topbar .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text3); pointer-events: none; }
.topbar-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.topbar-right .btn-icon { padding: 6px; border-radius: var(--radius-sm); color: var(--text3); font-size: 14px; }
.topbar-right .btn-icon:hover { background: var(--surface2); color: var(--text); }
.topbar-right .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light); color: var(--primary-text); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; }

/* Content area */
.content-area { flex: 1; display: flex; min-height: 0; }

/* Note list panel */
.note-list-panel { width: var(--list-w); border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0; transition: background .3s; }
.panel-header { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-header h3 { font-size: 14px; font-weight: 600; color: var(--text); }
.panel-header .count { font-size: 12px; color: var(--text3); }
.list-toolbar { display: flex; gap: 4px; padding: 0 12px 8px; flex-shrink: 0; flex-wrap: wrap; }
.list-toolbar .chip { padding: 3px 10px; border-radius: 14px; font-size: 11px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all var(--transition); }
.list-toolbar .chip:hover { border-color: var(--primary); color: var(--primary); }
.list-toolbar .chip.active { background: var(--primary-light); border-color: var(--primary-light); color: var(--primary-text); }
.note-list-scroll { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.note-card { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all .12s; border: 1px solid transparent; margin-bottom: 2px; position: relative; }
.note-card:hover { background: var(--surface2); }
.note-card.selected { background: var(--primary-light); border-color: var(--primary); }
.note-card .nc-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
.note-card .nc-title .pin-icon { font-size: 10px; color: var(--accent); }
.note-card .nc-snippet { font-size: 12px; color: var(--text3); line-height: 1.5; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.note-card .nc-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 11px; color: var(--text3); }
.note-card .nc-meta .nc-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.note-card .nc-meta .nc-tag { padding: 1px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary-text); font-size: 10px; }
.note-card .nc-meta .nc-notebook { padding: 1px 6px; border-radius: 4px; background: var(--surface2); color: var(--text2); font-size: 10px; display: flex; align-items: center; gap: 3px; }
.note-card .nc-actions { position: absolute; top: 6px; right: 6px; display: none; gap: 2px; }
.note-card:hover .nc-actions { display: flex; }
.note-card .nc-actions .btn-icon { padding: 3px 5px; font-size: 11px; border-radius: 4px; color: var(--text3); }
.note-card .nc-actions .btn-icon:hover { background: var(--border); color: var(--text); }
.note-card .nc-actions .btn-icon.pin-active { color: var(--accent); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 13px; }
.empty-state i { font-size: 32px; margin-bottom: 12px; opacity: .4; }

/* Editor panel */
.editor-panel { flex: 1; display: flex; flex-direction: column; background: var(--surface); min-width: 0; transition: background .3s; }
.editor-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text3); font-size: 14px; padding: 40px; text-align: center; }
.editor-empty i { font-size: 48px; opacity: .2; margin-bottom: 16px; }
.editor-empty h2 { font-size: 18px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
.editor-empty p { font-size: 13px; max-width: 280px; line-height: 1.6; }
.editor-toolbar { display: none; padding: 8px 16px 4px; gap: 8px; align-items: center; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.editor-toolbar.show { display: flex; }
.editor-toolbar .et-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.editor-toolbar .et-date { font-size: 11px; color: var(--text3); white-space: nowrap; }
.editor-toolbar .et-title input { border: none; background: none; font-size: 16px; font-weight: 600; color: var(--text); outline: none; width: 100%; min-width: 60px; padding: 4px 0; }
.editor-toolbar .et-title input::placeholder { color: var(--text3); }
.editor-toolbar .et-right { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.editor-toolbar .et-right .btn-icon { padding: 5px; border-radius: 4px; font-size: 13px; color: var(--text3); }
.editor-toolbar .et-right .btn-icon:hover { background: var(--surface2); color: var(--text); }
.editor-toolbar .et-right .btn-icon.pin-active { color: var(--accent); }
.editor-body { display: none; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.editor-body.show { display: flex; }
.editor-body #editor-container { flex: 1; display: flex; flex-direction: column; }
.editor-body .ql-toolbar { border: none; border-radius: 0; background: transparent; padding: 4px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.editor-body .ql-container { border: none; flex: 1; font-size: 14px; }
.editor-body .ql-editor { padding: 16px 20px; }
.editor-body .ql-editor.ql-blank::before { color: var(--text3); font-style: normal; }
.editor-footer { display: none; padding: 6px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); align-items: center; gap: 12px; flex-shrink: 0; }
.editor-footer.show { display: flex; }
.editor-footer .save-status { display: flex; align-items: center; gap: 4px; }
.editor-footer .save-status.saving { color: var(--accent); }
.editor-footer .save-status.saved { color: var(--success); }
.editor-footer .save-status.error { color: var(--danger); }
.editor-footer .tag-bar { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; }
.editor-footer .tag-bar .tag-edit { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary-text); font-size: 10px; cursor: pointer; }
.editor-footer .tag-bar .tag-edit .remove { cursor: pointer; opacity: .5; }
.editor-footer .tag-bar .tag-edit .remove:hover { opacity: 1; }
.editor-footer .tag-bar .tag-input-mini { border: none; background: none; font-size: 11px; color: var(--text3); outline: none; width: 60px; padding: 2px; }
.editor-footer .tag-bar .tag-input-mini::placeholder { color: var(--text3); }

/* ─── Dashboard ─── */
.dashboard { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 24px 28px; }
.dashboard.show { display: flex; }
.db-header { margin-bottom: 24px; }
.db-header h2 { font-size: 20px; font-weight: 700; }
.db-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }
.db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
.db-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.db-card .db-value { font-size: 24px; font-weight: 700; color: var(--primary); }
.db-card .db-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.db-card .db-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.db-section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.heatmap-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 28px; overflow-x: auto; }
.heatmap-wrap canvas { display: block; }
.recent-notes { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.recent-card { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all var(--transition); }
.recent-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.recent-card .rc-title { font-size: 13px; font-weight: 600; color: var(--text); }
.recent-card .rc-snippet { font-size: 12px; color: var(--text3); margin-top: 4px; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; display: -webkit-box; }
.recent-card .rc-date { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* ─── Quick Capture Modal ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; justify-content: center; align-items: flex-start; padding-top: 80px; z-index: 9998; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal-box { width: 520px; max-width: 90vw; background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden; }
.modal-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-header .close-btn { padding: 4px 8px; border-radius: 4px; color: var(--text3); }
.modal-header .close-btn:hover { background: var(--surface2); }
.modal-body { padding: 12px 20px 20px; }
.modal-body .qc-title { width: 100%; padding: 8px 0; border: none; background: none; font-size: 16px; font-weight: 600; color: var(--text); outline: none; }
.modal-body .qc-title::placeholder { color: var(--text3); }
.modal-body .qc-editor { min-height: 120px; margin-top: 8px; }
.modal-body .qc-editor .ql-editor { min-height: 100px; padding: 0; }
.modal-body .qc-editor .ql-container { font-size: 14px; }
.modal-body .qc-editor .ql-toolbar { padding: 4px 0; }
.modal-footer { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }
.modal-footer .btn { padding: 7px 16px; font-size: 13px; }
.modal-footer .qc-tags { flex: 1; display: flex; gap: 4px; flex-wrap: wrap; }
.modal-footer .qc-tags .qc-tag { padding: 2px 8px; border-radius: 4px; background: var(--primary-light); color: var(--primary-text); font-size: 11px; display: flex; align-items: center; gap: 3px; }
.modal-footer .qc-tags .qc-tag .remove { cursor: pointer; opacity: .5; }
.modal-footer .qc-tags .qc-tag .remove:hover { opacity: 1; }
.modal-footer .qc-tag-input { border: none; background: none; font-size: 12px; color: var(--text3); outline: none; width: 50px; }

/* ─── User dropdown ─── */
.user-dropdown { position: absolute; top: 44px; right: 8px; width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); display: none; z-index: 100; }
.user-dropdown.show { display: block; }
.user-dropdown .ud-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background .1s; }
.user-dropdown .ud-item:hover { background: var(--surface2); color: var(--text); }
.user-dropdown .ud-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.user-dropdown .ud-item:last-child { border-radius: 0 0 var(--radius) var(--radius); border-top: 1px solid var(--border); color: var(--danger); }

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .note-list-panel { width: 100%; }
  .editor-panel { display: none; }
  .editor-panel.show-mobile { display: flex; position: fixed; inset: 0; z-index: 50; background: var(--surface); }
  .dashboard { padding: 16px; }
  .db-grid { grid-template-columns: repeat(2, 1fr); }
  .recent-notes { grid-template-columns: 1fr; }
  .sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 60; width: 260px; }
  .topbar { padding: 0 12px; }
}
@media (max-width: 480px) {
  .db-grid { grid-template-columns: 1fr 1fr; }
  .dashboard { padding: 12px; }
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ─── Login ─── -->
<div id="loginPage" class="show">
  <div class="login-card">
    <h1><i class="fas fa-feather" style="color:var(--primary);"></i> Notes</h1>
    <div class="sub">记录每一天的思考与灵感</div>
    <div id="authErr" class="auth-err"></div>
    <div class="fg">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="至少 6 位" autocomplete="current-password">
    </div>
    <div class="fg" id="confirmGroup" style="display:none;">
      <label>确认密码</label>
      <input type="password" id="authConfirm" placeholder="再次输入密码">
    </div>
    <button class="btn btn-primary" id="authBtn">登录</button>
    <div class="auth-footer">
      <span id="authToggleText">没有账号？</span>
      <a id="authToggleLink">立即注册</a>
    </div>
  </div>
</div>

<!-- ─── App ─── -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-feather"></i></div>
      <h2>Notes</h2>
      <button class="btn-icon" onclick="toggleSidebar()" title="收起侧栏"><i class="fas fa-bars"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <button class="nav-item active" data-view="all" onclick="switchView('all')"><i class="far fa-file-alt"></i> 所有笔记 <span class="badge" id="badgeAll">0</span></button>
        <button class="nav-item" data-view="today" onclick="switchView('today')"><i class="far fa-calendar-check"></i> 今天</button>
        <button class="nav-item" data-view="favorites" onclick="switchView('favorites')"><i class="far fa-star"></i> 收藏</button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">笔记本</div>
        <div id="notebookList"></div>
        <button class="nav-item" onclick="addNotebook()" style="color:var(--text3);font-size:12px;"><i class="fas fa-plus"></i> 新建笔记本</button>
      </div>
      <div class="nav-section" style="margin-top:8px;">
        <button class="nav-item" data-view="archive" onclick="switchView('archive')"><i class="far fa-archive"></i> 归档 <span class="badge" id="badgeArchive">0</span></button>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <!-- Top bar -->
    <div class="topbar">
      <button class="btn-icon" onclick="toggleSidebar()" style="display:none;" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="onSearch()">
      </div>
      <div class="topbar-right">

async function loadNotebooks(){

    let set=new Set();if(data)data.forEach(r=>{if(r.notebook)set.add(r.notebook);});

}
function renderNotebooks(){
  let el=$('notebookList');el.innerHTML='';

function stringToColor(s){
  let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);
  let c='hsl('+(h%360)+',50%,55%)';return c;
}

/* ─── Dashboard ─── */
function initDashboard(){
  let h=new Date().getHours();

function updateDashboard(){
  let active=notes.filter(n=>!n.archived);
  $('dashNotes').textContent=active.length;
  let words=0;active.forEach(n=>words+=strip(n.content||'').length);
  $('dashWords').textContent=words;
  let today=dateStr(new Date());
  $('dashToday').textContent=active.filter(n=>n.date===today).length;
  // Streak
  let days=[...new Set(active.map(n=>n.date))].sort().reverse();
  let streak=0,check=new Date(today+'T00:00:00');
  for(let i=0;i<days.length;i++){
    let diff=Math.round((check-new Date(days[i]+'T00:00:00'))/(86400000));
    if(diff===streak)streak++;else break;
  }
  $('dashStreak').textContent=streak;
  // Recent notes
  let recent=active.slice(0,12);
  let html='';recent.forEach(n=>{
    let s=strip(n.content||'').substring(0,100);
    html+='<div class="recent-card" onclick="openNote(\''+n.id+'\')"><div class="rc-title">'+esc(n.title||'无标题')+'</div><div class="rc-snippet">'+esc(s)+'</div><div class="rc-date">'+fmtDate(n.date)+'</div></div>';
  });
  $('recentNotes').innerHTML=html||'<div style="color:var(--text3);font-size:13px;">还没有笔记</div>';
  drawHeatmap(active);
}

/* ─── Heatmap ─── */
function drawHeatmap(records){
  let c=$('heatmap'),ctx=c.getContext('2d');
  let W=c.parentElement.clientWidth-32||600;
  c.width=W;c.height=120;
  ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#161b22':'#f7f8fa';
  ctx.fillRect(0,0,c.width,c.height);
  let dayMap={};records.forEach(n=>{if(n.date)dayMap[n.date]=(dayMap[n.date]||0)+1;});
  let today=new Date(),start=new Date(today);start.setDate(start.getDate()-83);
  let cellW=Math.floor((W-40)/85),cellH=12,gap=3;
  let max=Math.max(...Object.values(dayMap),1);
  let colors=['#ebedf0','#9be9a8','#40c463','#30a14e','#216e39'];
  if(document.documentElement.getAttribute('data-theme')==='dark')colors=['#161b22','#0e4429','#006d32','#26a641','#39d353'];
  for(let i=0;i<85;i++){
    let d=new Date(start);d.setDate(d.getDate()+i);
    let ds=dateStr(d);
    let val=dayMap[ds]||0;
    let idx=val===0?0:Math.min(Math.ceil((val/max)*4),4);
    ctx.fillStyle=colors[idx];
    ctx.fillRect(20+i*(cellW+gap),10,cellW,cellH);
  }
}

/* ─── Filters ─── */
let currentNotebook=null;

function applyFilters(){
  let filtered=[...notes];
  if(currentView==='today'){let t=dateStr(new Date());filtered=filtered.filter(n=>n.date===t);}
  else if(currentView==='favorites')filtered=filtered.filter(n=>n.favorite&&!n.archived);
  else if(currentView==='archive')filtered=filtered.filter(n=>n.archived);
  else if(currentView==='notebook')filtered=filtered.filter(n=>n.notebook===currentNotebook&&!n.archived);
  else filtered=filtered.filter(n=>!n.archived);
  if(searchTerm){
    let kw=searchTerm.toLowerCase();
    if(kw.startsWith('#'))filtered=filtered.filter(n=>(n.tags||[]).some(t=>t.toLowerCase().includes(kw.slice(1))));
    else if(kw.startsWith('@'))filtered=filtered.filter(n=>(n.notebook||'').toLowerCase().includes(kw.slice(1)));
    else filtered=filtered.filter(n=>{
      let t=(n.title||'').toLowerCase(),c=strip(n.content||'').toLowerCase();
      return t.includes(kw)||c.includes(kw);
    });
  }
  if(currentSort==='pinned')filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.date.localeCompare(a.date));
  else if(currentSort==='oldest')filtered.sort((a,b)=>a.date.localeCompare(b.date));
  else filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.date.localeCompare(a.date)||(b.created_at||'').localeCompare(a.created_at||''));
  renderNoteList(filtered);
  $('listCount').textContent=filtered.length+' 篇';
}
function setSort(s){currentSort=s;document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('active',el.dataset.sort===s));applyFilters();}

}
async function toggleFavCurrent(){
  let n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let v=!n.favorite;
  try{await sb.from('daily_notes').update({favorite:v}).eq('id',currentNoteId);n.favorite=v;updatePinFavBtns(n);applyFilters();}catch(e){toast('操作失败','error');}
}
async function archiveNote(id,e){if(e)e.stopPropagation();
  try{await sb.from('daily_notes').update({archived:true}).eq('id',id);toast('已归档','success');
    if(currentNoteId===id){clearEditor();}loadNotes();}catch(e){toast('归档失败','error');}
}
async function archiveCurrentNote(){
  if(!currentNoteId)return;
  try{await sb.from('daily_notes').update({archived:true}).eq('id',currentNoteId);toast('已归档','success');clearEditor();loadNotes();}catch(e){toast('归档失败','error');}
}
function exportCurrentNote(){
  let n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let title=n.title||'无标题',content=strip(n.content||''),tags=(n.tags||[]).map(t=>'#'+t).join(' ');
  let md='# '+title+'\n\n日期：'+n.date+'\n标签：'+(tags||'无')+'\n\n---\n\n'+content;
  downloadMd(md,title+'_'+n.date+'.md');toast('已导出','success');
}
function exportAllNotes(){
  $('userMenu').classList.remove('show');
  if(!notes.length){toast('没有笔记可导出','warning');return;}
  let md='# 笔记导出\n\n导出时间：'+new Date().toLocaleString()+'\n共 '+notes.length+' 篇\n\n---\n\n';
  notes.forEach(n=>{let t=n.title||'无标题',c=strip(n.content||''),tags=(n.tags||[]).map(t=>'#'+t).join(' ');
    md+='## '+t+'\n\n日期：'+n.date+'\n标签：'+(tags||'无')+'\n\n'+c+'\n\n---\n\n';});
  downloadMd(md,'notes_export_'+dateStr(new Date())+'.md');toast('已导出 '+notes.length+' 篇','success');
}
function downloadMd(content,name){
  let b=new Blob([content],{type:'text/markdown;charset=utf-8'}),u=URL.createObjectURL(b);
  let a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}

/* ─── Save ─── */
async function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{if(currentNoteId)saveNote();},2000);
  updateSaveStatus('unsaved');
}
function updateSaveStatus(t){
  let el=$('saveStatus');
  if(t==='saving'){el.className='save-status saving';el.innerHTML='<i class="fas fa-spinner fa-spin"></i> 保存中';}
  else if(t==='saved'){el.className='save-status saved';el.innerHTML='<i class="fas fa-check-circle"></i> 已保存';}
  else if(t==='unsaved'){el.className='save-status saving';el.innerHTML='<i class="fas fa-pen"></i> 未保存';}
}

let saving=false;
async function saveNote(){
  if(!currentNoteId||saving)return;
  let title=$('noteTitle').value.trim()||'无标题';
  let content=quill?quill.root.innerHTML:'';
  let tags=getEditorTags();
  saving=true;updateSaveStatus('saving');
  try{
    let {error}=await sb.from('daily_notes').update({title,content,tags,updated_at:new Date().toISOString()}).eq('id',currentNoteId);
    if(error)throw error;
    updateSaveStatus('saved');
    let n=notes.find(x=>x.id===currentNoteId);if(n){n.title=title;n.content=content;n.tags=tags;}
    applyFilters();updateDashboard();
  }catch(e){toast('保存失败','error');updateSaveStatus('error');}
  finally{saving=false;}
}

/* ─── Editor ─── */
function initQuill(){
  if(quill)return;
  quill=new Quill('#editorContainer',{
    theme:'snow',placeholder:'开始书写...',
    modules:{
      toolbar:[
        [{header:[1,2,3,false]}],['bold','italic','underline','strike'],
        [{list:'ordered'},{list:'bullet'},{list:'check'}],
        ['blockquote','code-block'],[{script:'sub'},{script:'super'}],
        [{indent:'-1'},{indent:'+1'}],[{color:[]},{background:[]}],
        ['link','image'],['clean']
      ]
    }
  });
  quill.on('text-change',()=>{if(currentNoteId)autoSave();});
  $('noteTitle').addEventListener('input',()=>{if(currentNoteId)autoSave();});
  $('editorContainer').addEventListener('paste',function(e){
    let items=(e.clipboardData||e.originalEvent?.clipboardData)?.items;
    if(!items)return;
    for(let item of items){
      if(item.type.indexOf('image')===0){
        e.preventDefault();
        let blob=item.getAsFile(),reader=new FileReader();
        reader.onload=ev=>{
          let range=quill.getSelection();
          if(range)quill.clipboard.dangerouslyPasteHTML(range.index,'<img src="'+ev.target.result+'" alt="" style="max-width:100%">');
          else quill.clipboard.dangerouslyPasteHTML(quill.getLength(),'<img src="'+ev.target.result+'" alt="" style="max-width:100%">');
          if(currentNoteId)autoSave();
        };
        reader.readAsDataURL(blob);return;
      }
    }
  });
}
function clearEditor(){
  currentNoteId=null;selectedNoteId=null;
  $('editorEmpty').style.display='flex';$('editorToolbar').classList.remove('show');$('editorBody').classList.remove('show');$('editorFooter').classList.remove('show');
  if(quill)quill.root.innerHTML='';$('noteTitle').value='';$('tagBar').innerHTML='';
  showDashboard();
  closeMobileEditor();
}
function closeMobileEditor(){if(innerWidth<=900)$('editorPanel').classList.remove('show-mobile');}

/* ─── Quick Capture ─── */
function showQuickCapture(){
  $('qcModal').classList.add('show');
  $('qcTitle').value='';
  if(!qcQuill){
    qcQuill=new Quill('#qcEditor',{theme:'snow',placeholder:'写点什么...',modules:{toolbar:[['bold','italic','underline'],[{list:'bullet'}],['link']]}});
  }else qcQuill.root.innerHTML='';
  $('qcTags').innerHTML='';
  // Populate notebook select
  let sel=$('qcNotebook');sel.innerHTML='<option value="">无笔记本</option>';
  notebooks.forEach(nb=>{let o=document.createElement('option');o.value=nb;o.textContent=nb;sel.appendChild(o);});
  setTimeout(()=>$('qcTitle').focus(),100);
}
function hideQuickCapture(){$('qcModal').classList.remove('show');}
let qcTags=[];
function addQcTag(){
  let inp=$('qcTagInput'),tag=inp.value.trim().replace(/^#+/,'');
  if(!tag)return;
  if(qcTags.includes(tag)){inp.value='';return;}
  qcTags.push(tag);
  let el=$('qcTags');
  let s=document.createElement('span');s.className='qc-tag';
  s.innerHTML=esc(tag)+' <span class="remove" onclick="this.parentElement.remove();qcTags=qcTags.filter(t=>t!==\''+esc(tag).replace(/'/g,"\\'")+'\')">&times;</span>';
  el.appendChild(s);
  inp.value='';inp.focus();
}
async function saveQuickCapture(){
  let title=$('qcTitle').value.trim()||'无标题';
  let content=qcQuill?qcQuill.root.innerHTML:'';
  let tags=[...qcTags];
  let notebook=$('qcNotebook').value;
  if(!strip(content).trim()&&!title){toast('请输入内容','warning');return;}
  let btn=$('qcModal').querySelector('.btn-primary');btn.disabled=true;btn.textContent='保存中...';
  try{
    let {data:{user:u}}=await sb.auth.getUser();
    let {error}=await sb.from('daily_notes').insert({title,content,date:dateStr(new Date()),tags,user_id:u.id,notebook:notebook||null});
    if(error)throw error;
    toast('已保存','success');hideQuickCapture();loadNotes();
  }catch(e){toast('保存失败：'+e.message,'error');}
  finally{btn.disabled=false;btn.textContent='保存';qcTags=[];}
}

/* ─── User menu ─── */
function toggleUserMenu(){$('userMenu').classList.toggle('show');}
document.addEventListener('click',function(e){let m=$('userMenu');if(!e.target.closest('.user-avatar')&&!e.target.closest('.user-dropdown'))m.classList.remove('show');});

/* ─── Keyboard shortcuts ─── */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if($('qcModal').classList.contains('show')){if(e.key==='Escape')hideQuickCapture();return;}
  if(e.key==='n'||e.key==='N'){e.preventDefault();showQuickCapture();}
  if(e.key==='Escape'&&currentNoteId&&innerWidth<=900)closeMobileEditor();
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(currentNoteId)saveNote();}
  if(e.key==='d'&&(e.ctrlKey||e.metaKey)){e.preventDefault();toggleDarkMode();}
});

/* ─── Init ─── */
document.addEventListener('DOMContentLoaded',async function(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  let {data:{session:s}}=await sb.auth.getSession();
  if(s){session=s;user=s.user;showApp();}
  else showLogin();
  sb.auth.onAuthStateChange((ev,s)=>{
    if(ev==='SIGNED_IN'&&s){session=s;user=s.user;if(!quill)initQuill();showApp();}
    else if(ev==='SIGNED_OUT'){showLogin();}
  });
});
</script>
