<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日睡眠记录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f4f8; color: #333; padding: 20px; min-height: 100vh; display: flex; justify-content: center; }
.container { max-width: 600px; width: 100%; }
h1 { text-align: center; color: #1a365d; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; font-weight: 500; }
input[type="date"], input[type="time"] { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; outline: none; transition: border .2s; }
input:focus { border-color: #3b82f6; }
.row { display: flex; gap: 12px; }
.row .form-group { flex: 1; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background .2s; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; padding: 6px 12px; font-size: 13px; width: auto; }
.btn-danger:hover { background: #dc2626; }
.record { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
.record:last-child { border-bottom: none; }
.record-info { flex: 1; }
.record-date { font-weight: 600; color: #1a365d; }
.record-detail { font-size: 13px; color: #888; margin-top: 2px; }
.record-duration { font-size: 15px; font-weight: 600; color: #3b82f6; }
.empty { text-align: center; color: #999; padding: 32px 0; }
.stats { display: flex; gap: 12px; }
.stat { flex: 1; text-align: center; padding: 12px; background: #f8fafc; border-radius: 8px; }
.stat-value { font-size: 24px; font-weight: 700; color: #1a365d; }
.stat-label { font-size: 12px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>每日睡眠记录</h1>

  <div class="card">
    <div class="row">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="date">
      </div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>入睡时间</label>
        <input type="time" id="bedtime" value="23:00">
      </div>
      <div class="form-group">
        <label>起床时间</label>
        <input type="time" id="waketime" value="07:00">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveRecord()">保存记录</button>
  </div>

  <div class="card">
    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <h2 style="font-size:18px; margin-bottom:12px; color:#1a365d;">历史记录</h2>
    <div id="records"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gtgtbsylalibqhxztcta.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_1YHehRDqEXk2IRCJc3AmyA__8B5fe-x';

const headers = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function api(path, options) {
  let res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers, ...options });
  if (!res.ok) throw new Error(res.status + ' ' + (await res.text()));
  return res.json();
}

function calcDuration(bed, wake) {
  let [bh, bm] = bed.split(':').map(Number);
  let [wh, wm] = wake.split(':').map(Number);
  let start = bh * 60 + bm;
  let end = wh * 60 + wm;
  if (end <= start) end += 1440;
  return end - start;
}

function fmtDuration(min) {
  let h = Math.floor(min / 60);
  let m = min % 60;
  return h + '时' + m + '分';
}

function fmtDate(dateStr) {
  let d = new Date(dateStr + 'T00:00:00');
  let m = d.getMonth() + 1;
  let day = d.getDate();
  let weekdays = ['日','一','二','三','四','五','六'];
  return m + '月' + day + '日 周' + weekdays[d.getDay()];
}

async function getRecords() {
  try {
    return await api('sleep_records?order=date.desc');
  } catch (e) { console.error(e); return []; }
}

async function saveRecord() {
  let date = document.getElementById('date').value;
  let bedtime = document.getElementById('bedtime').value;
  let waketime = document.getElementById('waketime').value;
  if (!date || !bedtime || !waketime) { alert('请填写完整信息'); return; }
  let duration = calcDuration(bedtime, waketime);

  try {
    await api('sleep_records?on_conflict=date', {
      method: 'POST',
      body: JSON.stringify({ date, bedtime, waketime, duration }),
      headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=representation' }
    });
    document.getElementById('date').value = '';
    render();
  } catch (e) { alert('保存失败：' + e.message); }
}

async function deleteRecord(date) {
  try {
    await api('sleep_records?date=eq.' + date, { method: 'DELETE' });
    render();
  } catch (e) { alert('删除失败：' + e.message); }
}

async function render() {
  let records = await getRecords();
  let container = document.getElementById('records');
  let statsEl = document.getElementById('stats');

  if (records.length === 0) {
    container.innerHTML = '<div class="empty">暂无记录</div>';
    statsEl.innerHTML = '';
    return;
  }

  let total = records.reduce((s, r) => s + r.duration, 0);
  let avg = Math.round(total / records.length);
  let today = new Date();
  let recent7 = records.filter(r => {
    let diff = (today - new Date(r.date + 'T00:00:00')) / 86400000;
    return diff < 7;
  });
  let avg7 = recent7.length ? Math.round(recent7.reduce((s, r) => s + r.duration, 0) / recent7.length) : avg;

  statsEl.innerHTML =
    '<div class="stat"><div class="stat-value">' + fmtDuration(avg) + '</div><div class="stat-label">平均睡眠</div></div>' +
    '<div class="stat"><div class="stat-value">' + fmtDuration(avg7) + '</div><div class="stat-label">近7天平均</div></div>' +
    '<div class="stat"><div class="stat-value">' + records.length + '</div><div class="stat-label">总天数</div></div>';

  container.innerHTML = records.map(r =>
    '<div class="record">' +
      '<div class="record-info">' +
        '<div class="record-date">' + fmtDate(r.date) + '</div>' +
        '<div class="record-detail">' + r.bedtime + ' → ' + r.waketime + '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span class="record-duration">' + fmtDuration(r.duration) + '</span>' +
        '<button class="btn btn-danger" onclick="deleteRecord(\'' + r.date + '\')">删除</button>' +
      '</div>' +
    '</div>'
  ).join('');
}

document.getElementById('date').value = new Date().toISOString().slice(0, 10);
render();
</script>
</body>
</html>
